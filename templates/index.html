<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>쿠콘 보도자료/언론기사 모니터링</title>
  <link rel="icon" type="image/x-icon" href="/static/favicon.ico" />
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #f0f4fb;
      --bg-card:    #ffffff;
      --accent:     #1e40af;
      --accent2:    #2563eb;
      --accent-lt:  #dbeafe;
      --aml-color:  #b91c1c;
      --aml-lt:     #fee2e2;
      --pay-color:  #0f766e;
      --pay-lt:     #ccfbf1;
      --accent-grd: linear-gradient(135deg,#1e3a8a,#2563eb);
      --aml-grd:    linear-gradient(135deg,#b91c1c,#ea580c);
      --pay-grd:    linear-gradient(135deg,#0f766e,#0891b2);
      --nav-bg:     #ffffff;
      --sidebar-bg: #ffffff;
      --bd:         #d1ddf0;
      --bd2:        #93afd4;
      --t1:         #0f172a;
      --t2:         #334155;
      --t3:         #64748b;
      --sh-sm:      0 1px 2px rgba(15,23,42,.06);
      --sh:         0 1px 4px rgba(15,23,42,.09),0 1px 2px rgba(15,23,42,.05);
      --sh-md:      0 4px 12px rgba(15,23,42,.08),0 2px 4px rgba(15,23,42,.04);
    }

    html, body { height: 100%; }
    body {
      font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
      background: var(--bg); color: var(--t1);
      display: flex; flex-direction: column; overflow: hidden;
    }

    /* ── HEADER ── */
    header {
      height: 64px; flex-shrink: 0;
      display: flex; align-items: center; gap: 12px;
      padding: 0 20px 0 20px;
      background: var(--nav-bg);
      border-bottom: 1px solid var(--bd);
      box-shadow: 0 1px 6px rgba(15,23,42,.07);
      z-index: 100; overflow: visible;
    }
    .hdr-logo {
      display: flex; align-items: center; gap: 9px; flex-shrink: 0;
    }
    .hdr-badge {
      width: 30px; height: 30px; border-radius: 8px;
      background: var(--accent-grd);
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 800; color: #fff; letter-spacing: -.5px;
    }
    .hdr-title { font-size: 14px; font-weight: 700; color: var(--t1); letter-spacing: -.2px; }
    .hdr-spacer { flex: 1; }
    .hdr-date { font-size: 11px; color: var(--t3); margin-right: 8px; }

    /* 로그 패널 쿠코니 캐릭터 */
    .log-kukoni-wrap {
      position: relative; flex-shrink: 0;
      border-top: 1px solid var(--bd);
      background: #fff;
      display: flex; align-items: center; justify-content: center;
      padding: 8px 0 4px;
    }
    .log-kukoni-wrap video {
      height: 120px; width: auto; object-fit: contain;
      background: #ffffff;
      mix-blend-mode: multiply;
      filter: brightness(1.08) contrast(0.95);
    }
    .log-kukoni-bubble {
      position: absolute; top: 10px; right: 8px;
      background: #fff; border: 1.5px solid var(--accent-lt);
      border-radius: 10px 10px 0 10px;
      padding: 3px 9px; font-size: 10px; font-weight: 600; color: var(--accent);
      white-space: nowrap; box-shadow: var(--sh-sm);
      animation: pop .25s ease;
    }
    @keyframes pop { from{opacity:0;transform:scale(.8)} to{opacity:1;transform:scale(1)} }

    .collect-btn {
      padding: 7px 16px; border-radius: 8px; border: none;
      font-size: 12px; font-weight: 700; cursor: pointer;
      transition: all .18s; white-space: nowrap; color: #fff;
      display: flex; align-items: center; gap: 5px;
    }
    .collect-btn.primary { background: var(--accent2); }
    .collect-btn:hover:not(:disabled) { filter: brightness(1.1); box-shadow: var(--sh); }
    .collect-btn:disabled { opacity: .5; cursor: not-allowed; }

    /* 로그 토글 버튼 */
    .log-toggle-btn {
      padding: 6px 12px; border-radius: 8px;
      border: 1px solid var(--bd); background: #f8faff;
      color: var(--t2); font-size: 11px; font-weight: 600;
      cursor: pointer; transition: all .15s;
      display: flex; align-items: center; gap: 5px; white-space: nowrap;
    }
    .log-toggle-btn:hover { background: var(--accent-lt); border-color: var(--accent2); color: var(--accent); }

    /* ── BODY WRAP ── */
    #wrap { display: flex; flex: 1; overflow: hidden; }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 140px; flex-shrink: 0;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--bd);
      padding: 16px 8px;
      display: flex; flex-direction: column; gap: 4px;
    }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: 8px;
      cursor: pointer; font-size: 13px; font-weight: 600; color: var(--t2);
      transition: all .15s; border: 1px solid transparent;
      user-select: none;
    }
    .nav-item:hover { background: #f1f5f9; color: var(--t1); }
    .nav-item.active { background: var(--accent-lt); color: var(--accent); border-color: rgba(37,99,235,.2); }
    .nav-icon { font-size: 18px; flex-shrink: 0; }
    .nav-label { font-size: 13px; font-weight: 600; }

    /* 메인 검색창 */
    .main-search-wrap { display: flex; justify-content: center; margin: 14px 0 8px; }
    .main-search {
      width: 420px; display: flex; align-items: center; gap: 8px;
      border: 1px solid var(--bd); border-radius: 8px;
      padding: 0 12px; height: 36px; background: #fff;
      transition: border-color .18s, box-shadow .18s;
    }
    .main-search:focus-within { border-color: var(--accent2); box-shadow: 0 0 0 2px rgba(37,99,235,.1); }
    .main-search input {
      flex: 1; border: none; outline: none; background: transparent;
      font-size: 13px; font-family: inherit; color: var(--t1);
    }
    .main-search input::placeholder { color: var(--t3); }
    .main-search-icon { font-size: 13px; color: var(--t3); flex-shrink: 0; }

    /* 키워드 chip 바 (메인) */
    .main-kw-bar { display: flex; flex-wrap: wrap; justify-content: center; gap: 4px; margin-bottom: 12px; }
    .kw-chip {
      display: inline-flex; align-items: center;
      padding: 3px 10px; border-radius: 20px;
      border: 1px solid var(--bd); background: #f1f5f9;
      color: var(--t2); font-size: 11px; font-weight: 500;
      cursor: pointer; transition: all .15s; white-space: nowrap;
    }
    .kw-chip:hover { border-color: var(--bd2); background: #e2e8f0; }
    .kw-chip.active          { background: var(--accent-lt); border-color: var(--accent2); color: var(--accent); font-weight: 600; }
    .kw-chip.active.pay-chip { background: var(--pay-lt); border-color: var(--pay-color); color: var(--pay-color); }
    .kw-chip.active.aml-chip { background: var(--aml-lt); border-color: var(--aml-color); color: var(--aml-color); }

    /* 통합 필터 행 */
    .filter-bar {
      display: flex; align-items: center; gap: 6px;
      margin-bottom: 12px; flex-wrap: wrap;
    }
    .filter-divider { width: 1px; height: 18px; background: var(--bd); margin: 0 4px; }
    .filter-count { font-size: 11px; color: var(--t3); margin-left: auto; }

    /* 우선순위 버튼 (필터 바용) */
    .pri-btn {
      padding: 4px 12px; border-radius: 20px; border: 1px solid var(--bd);
      font-size: 11px; font-weight: 700; cursor: pointer; transition: all .15s;
      background: #f1f5f9; color: var(--t2); white-space: nowrap;
    }
    .pri-btn:hover { border-color: var(--bd2); background: #e2e8f0; }
    .pri-btn.active-high { background: #fef2f2; border-color: #fca5a5; color: #b91c1c; }
    .pri-btn.active-mid  { background: #fffbeb; border-color: #fcd34d; color: #92400e; }
    .pri-btn.active-low  { background: #f1f5f9; border-color: #94a3b8; color: #475569; }

    /* ── MAIN ── */
    .main { flex: 1; overflow-y: auto; padding: 20px 24px; }
    .main::-webkit-scrollbar { width: 4px; }
    .main::-webkit-scrollbar-thumb { background: var(--bd); border-radius: 2px; }

    /* 수집 기간 라벨 */
    .period-label {
      font-size: 11px; color: var(--t3); margin-bottom: 10px; font-weight: 500;
    }
    .period-label strong { color: var(--t2); }

    /* 통계 박스 4개 */
    .stat-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px;
    }
    .stat-box {
      background: var(--bg-card); border: 1px solid var(--bd);
      border-radius: 12px; padding: 14px 16px;
      cursor: pointer; transition: all .18s; box-shadow: var(--sh-sm);
    }
    .stat-box:hover { box-shadow: var(--sh); border-color: var(--bd2); transform: translateY(-1px); }
    .stat-box.active-data { border-color: var(--accent2); background: #f0f6ff; box-shadow: 0 0 0 2px rgba(37,99,235,.15), var(--sh); }
    .stat-box.active-pay  { border-color: var(--pay-color); background: #f0fdf8; box-shadow: 0 0 0 2px rgba(15,118,110,.15), var(--sh); }
    .stat-box.active-aml  { border-color: var(--aml-color); background: #fff5f5; box-shadow: 0 0 0 2px rgba(185,28,28,.15), var(--sh); }
    .stat-box.active-all  { border-color: #475569; background: #f8faff; box-shadow: 0 0 0 2px rgba(71,85,105,.12), var(--sh); }
    .stat-label { font-size: 11px; color: var(--t3); font-weight: 600; margin-bottom: 6px; }
    .stat-num   { font-size: 26px; font-weight: 700; color: var(--t1); line-height: 1; }
    .stat-unit  { font-size: 12px; color: var(--t3); margin-left: 3px; font-weight: 500; }

    /* 기사 리스트 */
    .list-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 10px;
    }
    .list-title { font-size: 13px; font-weight: 700; color: var(--t1); }
    .list-count { font-size: 11px; color: var(--t3); }

    .article-list { display: flex; flex-direction: column; gap: 8px; }

    .article-row {
      background: var(--bg-card); border: 1px solid var(--bd);
      border-radius: 10px; padding: 13px 16px;
      display: flex; flex-direction: column; gap: 6px;
      box-shadow: var(--sh-sm); transition: all .18s;
    }
    .article-row:hover { border-color: var(--bd2); box-shadow: var(--sh); }

    .row-top {
      display: flex; align-items: center; gap: 8px;
    }
    .agency-badge {
      font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 4px;
      color: #fff; white-space: nowrap; flex-shrink: 0;
    }
    .badge-data { background: var(--accent-grd); }
    .badge-pay  { background: var(--pay-grd); }
    .badge-aml  { background: var(--aml-grd); }
    .badge-news { background: linear-gradient(135deg,#6d28d9,#7c3aed); }

    /* 보도자료 / 언론기사 필터 버튼 */
    .source-filter { display: flex; gap: 4px; }
    .src-btn {
      padding: 4px 12px; border-radius: 20px; border: 1px solid var(--bd);
      font-size: 11px; font-weight: 600; cursor: pointer; transition: all .15s;
      background: #f1f5f9; color: var(--t2); white-space: nowrap;
    }
    .src-btn:hover { border-color: var(--bd2); background: #e2e8f0; }
    .src-btn.active-press { background: var(--accent-lt); border-color: var(--accent2); color: var(--accent); }
    .src-btn.active-news  { background: #f3e8ff; border-color: #7c3aed; color: #6d28d9; }
    .src-btn.active-all   { background: #f8faff; border-color: #475569; color: #475569; }

    .row-title {
      font-size: 14px; font-weight: 700; color: var(--t1); flex: 1;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .cat-tag {
      font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 10px;
      white-space: nowrap; flex-shrink: 0;
    }
    .tag-data { background: var(--accent-lt); color: var(--accent); border: 1px solid rgba(37,99,235,.25); }
    .tag-pay  { background: var(--pay-lt); color: var(--pay-color); border: 1px solid rgba(15,118,110,.25); }
    .tag-aml  { background: var(--aml-lt); color: var(--aml-color); border: 1px solid rgba(185,28,28,.25); }

    .pri-badge {
      font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 10px;
      white-space: nowrap; flex-shrink: 0;
    }
    .pri-high { background: #ecfdf5; color: #16a34a; border: 1px solid #86efac; }
    .pri-mid  { background: #eff6ff; color: #2563eb; border: 1px solid #93c5fd; }
    .pri-low  { background: #f8fafc; color: #94a3b8; border: 1px solid #cbd5e1; }

    .row-lead {
      font-size: 12px; color: var(--t2); line-height: 1.6;
      display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden;
    }

    .row-bottom {
      display: flex; align-items: center; gap: 8px; margin-top: 2px;
    }
    .row-date { font-size: 12px; color: var(--t3); flex: 1; }

    .row-btn {
      padding: 5px 12px; border-radius: 6px; border: 1px solid var(--bd);
      font-size: 11px; font-weight: 600; cursor: pointer; transition: all .15s;
      background: #f8faff; color: var(--t2); white-space: nowrap;
    }
    .row-btn:hover:not(:disabled) { background: var(--accent2); color: #fff; border-color: var(--accent2); }
    .row-btn:disabled { opacity: .45; cursor: not-allowed; }
    .row-btn.ppt-btn:hover:not(:disabled) { background: var(--pay-color); border-color: var(--pay-color); color: #fff; }
    .link-btn {
      font-size: 11px; color: var(--accent2); text-decoration: none;
      padding: 4px 10px; border-radius: 6px; border: 1px solid var(--accent-lt);
      background: var(--accent-lt); font-weight: 600; transition: all .15s; flex-shrink: 0;
    }
    .link-btn:hover { background: var(--accent2); color: #fff; border-color: var(--accent2); }

    mark { background: rgba(37,99,235,.13); color: var(--accent); border-radius: 2px; padding: 0 1px; }

    .empty-list {
      padding: 48px 0; text-align: center;
      border: 1px dashed var(--bd); border-radius: 12px;
      color: var(--t3); font-size: 13px; background: var(--bg-card);
    }

    /* ── LOG PANEL ── */
    .log-panel {
      width: 280px; flex-shrink: 0;
      background: var(--sidebar-bg);
      border-left: 1px solid var(--bd);
      display: flex; flex-direction: column;
      overflow: hidden;
      transition: width .3s ease, opacity .3s ease;
    }
    /* 로그 패널 숨김 트랜지션 (Alpine x-transition 보조) */
    .log-panel[style*="display: none"] { width: 0; }

    .log-header {
      padding: 12px 14px 10px;
      border-bottom: 1px solid var(--bd);
      display: flex; align-items: center; gap: 7px; flex-shrink: 0;
    }
    .log-title { font-size: 12px; font-weight: 700; color: var(--t2); flex: 1; }
    .log-dot { width: 6px; height: 6px; border-radius: 50%; background: #94a3b8; transition: .3s; }
    .log-dot.live { background: #0ea5e9; animation: blink 1.2s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
    .log-clear {
      font-size: 10px; color: var(--t3); background: none; border: none;
      cursor: pointer; padding: 2px 6px; border-radius: 4px;
    }
    .log-clear:hover { background: #f1f5f9; color: var(--t1); }

    .log-body {
      flex: 1; overflow-y: auto; padding: 8px 12px;
    }
    .log-body::-webkit-scrollbar { width: 3px; }
    .log-body::-webkit-scrollbar-thumb { background: var(--bd); border-radius: 2px; }
    .log-line {
      font-family: 'Menlo','Consolas',monospace;
      font-size: 10.5px; color: var(--t2); line-height: 1.85;
      animation: slideIn .2s ease;
    }
    @keyframes slideIn { from{opacity:0;transform:translateX(-6px)} to{opacity:1;transform:translateX(0)} }
    .log-line.log-section {
      color: var(--accent); font-weight: 700; margin-top: 4px;
      border-top: 1px solid var(--bd); padding-top: 4px;
    }
    .log-line.log-ok { color: #16a34a; }
    .log-line::before { content: '›'; margin-right: 5px; color: var(--t3); }
    .log-line.log-section::before { content: ''; }
    .log-line.log-ok::before     { content: '✓'; color: #16a34a; }

    /* ── MODAL ── */
    .modal-backdrop {
      position: fixed; inset: 0; z-index: 500;
      background: rgba(15,23,42,.45);
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .modal {
      background: #fff; border-radius: 16px;
      width: 100%; max-width: 660px; max-height: 85vh;
      display: flex; flex-direction: column;
      box-shadow: 0 20px 60px rgba(15,23,42,.2);
      overflow: hidden;
    }
    .modal-header {
      padding: 16px 20px 14px;
      border-bottom: 1px solid var(--bd);
      display: flex; align-items: center; gap: 10px;
    }
    .modal-title { font-size: 14px; font-weight: 700; color: var(--t1); flex: 1; }
    .modal-close {
      width: 28px; height: 28px; border-radius: 6px;
      border: 1px solid var(--bd); background: #f8faff;
      color: var(--t3); cursor: pointer; font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      transition: all .15s;
    }
    .modal-close:hover { background: #f1f5f9; color: var(--t1); }
    .modal-body { flex: 1; overflow-y: auto; padding: 16px 20px; }
    textarea {
      width: 100%; min-height: 220px; resize: vertical;
      background: #f8faff; color: var(--t1);
      border: 1px solid var(--bd); border-radius: 8px;
      padding: 12px 14px; font-family: 'Pretendard', monospace;
      font-size: 12px; line-height: 1.9;
    }
    textarea:focus { outline: none; border-color: var(--accent2); box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
    .modal-footer {
      padding: 12px 20px;
      border-top: 1px solid var(--bd);
      display: flex; align-items: center; gap: 8px;
    }
    .modal-footer-spacer { flex: 1; }
    .btn-ppt {
      padding: 8px 20px; border-radius: 8px; border: none;
      background: var(--pay-grd); color: #fff;
      font-size: 12px; font-weight: 700; cursor: pointer; transition: all .18s;
    }
    .btn-ppt:hover:not(:disabled) { filter: brightness(1.1); }
    .btn-ppt:disabled { opacity: .4; cursor: not-allowed; }
    .btn-cancel {
      padding: 8px 18px; border-radius: 8px;
      border: 1px solid var(--bd); background: #f8faff;
      color: var(--t2); font-size: 12px; font-weight: 600; cursor: pointer; transition: all .15s;
    }
    .btn-cancel:hover { background: #f1f5f9; }

    .result-ok  { padding: 10px 14px; border-radius: 8px; font-size: 12px; background: #ecfdf5; border: 1px solid #6ee7b7; color: #065f46; margin-top: 12px; }
    .result-err { padding: 10px 14px; border-radius: 8px; font-size: 12px; background: #fef2f2; border: 1px solid #fca5a5; color: #991b1b; margin-top: 12px; }
    .result-path { font-size: 10px; color: var(--t3); margin-top: 4px; word-break: break-all; }

    /* ── 칸반 (전체 탭) ── */
    .kanban-wrap {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; align-items: stretch;
    }
    .kanban-col {
      background: #f8faff; border: 1px solid var(--bd);
      border-radius: 12px; padding: 0; overflow: hidden;
    }
    .kanban-col-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px; font-size: 12px; font-weight: 700;
      border-bottom: 1px solid var(--bd); background: var(--bg-card);
    }
    .kanban-col-title { letter-spacing: -.2px; }
    .kc-데이터   { color: var(--accent); }
    .kc-페이먼트 { color: var(--pay-color); }
    .kc-AML      { color: var(--aml-color); }
    .kanban-col-count { font-size: 10px; font-weight: 600; color: var(--t3); }
    .empty-col {
      padding: 24px 14px; font-size: 12px; color: var(--t3); text-align: center;
    }

    /* ── 카드 (공통) ── */
    .art-card {
      background: var(--bg-card); border-bottom: 1px solid var(--bd);
      padding: 12px 14px; display: flex; flex-direction: column; gap: 6px;
      transition: background .15s; cursor: default;
    }
    .art-card:last-child { border-bottom: none; }
    .art-card:hover { background: #f0f6ff; }
    .art-card-top { display: flex; align-items: center; gap: 6px; }
    .art-card-title {
      font-size: 14px; font-weight: 700; color: var(--t1); line-height: 1.45;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .art-card-lead {
      font-size: 12px; color: var(--t2); line-height: 1.55;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .art-card-foot {
      display: flex; align-items: center; gap: 6px; margin-top: 2px; flex-wrap: wrap;
    }
    .art-card-date { font-size: 12px; color: var(--t3); flex: 1; }
    .art-card-btns { display: flex; gap: 5px; }

    /* ── 카드 그리드 (개별 탭) ── */
    .card-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
    }
    .card-grid .art-card {
      border: 1px solid var(--bd); border-radius: 10px;
      box-shadow: var(--sh-sm); height: 100%;
    }
    .card-grid .art-card:last-child { border-bottom: 1px solid var(--bd); }
    .card-grid .art-card:hover { box-shadow: var(--sh); border-color: var(--bd2); background: var(--bg-card); }

    /* ── HISTORY ── */
    .history-wrap { padding: 4px 0; }

    /* 통계 카드 */
    .hist-stats { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
    .hist-stat-card {
      flex: 1; min-width: 100px; padding: 14px 18px; border-radius: 10px;
      border: 1.5px solid var(--bd); background: #fff; cursor: pointer;
      transition: all .15s; text-align: center;
    }
    .hist-stat-card:hover { border-color: var(--bd2); background: #f8faff; }
    .hist-stat-card.active { border-color: var(--accent); background: var(--accent-lt); }
    .hist-stat-card.active .hist-stat-label { color: var(--accent); font-weight: 700; }
    .hist-stat-card.active .hist-stat-num { color: var(--accent); }
    .hist-stat-num { font-size: 22px; font-weight: 800; color: var(--t1); line-height: 1.2; }
    .hist-stat-label { font-size: 11px; color: var(--t3); margin-top: 4px; font-weight: 600; }

    /* 검색 */
    .hist-search-wrap { margin-bottom: 14px; }
    .hist-search {
      display: flex; align-items: center; gap: 8px;
      border: 1px solid var(--bd); border-radius: 8px;
      padding: 0 14px; height: 38px; background: #fff; width: 100%;
      box-sizing: border-box;
    }
    .hist-search:focus-within { border-color: var(--accent2); }
    .hist-search input { flex: 1; border: none; outline: none; font-size: 13px; background: transparent; }

    /* 테이블 */
    .history-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .history-table th {
      background: #f1f5f9; padding: 10px 14px; text-align: left;
      border-bottom: 2px solid var(--bd); font-weight: 700; color: var(--t2); white-space: nowrap;
    }
    .history-table td {
      padding: 10px 14px; border-bottom: 1px solid var(--bd);
      color: var(--t2); vertical-align: top;
    }
    .history-table tr:hover td { background: #f8faff; }
    .history-summary {
      max-width: 400px; white-space: pre-wrap; font-size: 11px;
      color: var(--t3); line-height: 1.6; max-height: 80px; overflow: hidden;
    }
    .ppt-dl-btn {
      display: inline-block; padding: 5px 12px; border-radius: 6px;
      background: var(--accent); color: #fff; font-size: 11px; font-weight: 600;
      text-decoration: none; transition: opacity .15s;
    }
    .ppt-dl-btn:hover { opacity: .8; }
    .history-empty {
      text-align: center; padding: 48px; color: var(--t3); font-size: 13px;
    }
    .hist-result-count { font-size: 11px; color: var(--t3); margin-bottom: 8px; text-align: right; }

    [x-cloak] { display: none !important; }

    /* ── 법규/정책 탭 ── */
    .policy-wrap { padding: 4px 0; }
    .policy-controls {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 16px; flex-wrap: wrap;
    }
    .policy-chips { display: flex; gap: 4px; flex-wrap: wrap; }
    .policy-year-select { display: flex; align-items: center; gap: 6px; margin-left: auto; }
    .policy-year-label { font-size: 13px; font-weight: 700; color: var(--t1); min-width: 48px; text-align: center; }
    .gantt-card {
      background: var(--bg-card); border: 1px solid var(--bd);
      border-radius: 12px; overflow: hidden;
      box-shadow: var(--sh-sm); margin-bottom: 20px;
    }
    .gantt-header, .gantt-row {
      display: grid;
      grid-template-columns: 72px repeat(12, 1fr);
    }
    .gantt-header { background: #f1f5f9; }
    .gantt-row { border-top: 1px solid var(--bd); }
    .gantt-row:hover { background: #f8faff; }
    .gantt-row-label {
      padding: 10px 8px; display: flex; align-items: center;
      border-right: 1px solid var(--bd);
    }
    .gantt-label-text { font-size: 11px; font-weight: 700; white-space: nowrap; }
    .gantt-month-cell {
      padding: 8px 2px; font-size: 10px; font-weight: 700;
      color: var(--t3); text-align: center;
      border-right: 1px solid var(--bd);
    }
    .gantt-month-cell:last-child { border-right: none; }
    .gantt-cell {
      padding: 4px 2px; min-height: 40px;
      display: flex; flex-direction: column; gap: 2px; align-items: stretch;
      border-right: 1px solid var(--bd); max-height: 120px; overflow-y: auto;
    }
    .gantt-cell:last-child { border-right: none; }
    .gantt-pill {
      padding: 2px 4px; border-radius: 3px;
      font-size: 9px; font-weight: 700; color: #fff;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      cursor: pointer; transition: filter .15s, transform .15s;
      text-align: center;
    }
    .gantt-pill:hover { filter: brightness(1.2); transform: scale(1.05); z-index: 10; position: relative; }
    .policy-list-header {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px;
    }
    .policy-list-header .list-title { font-size: 13px; font-weight: 700; color: var(--t1); }
    .policy-list-header .list-count { font-size: 11px; color: var(--t3); }
    .policy-article-row { cursor: pointer; }
    .policy-notice { font-size: 11px; color: var(--t3); margin-left: 8px; }

    /* ── 법규/정책 관리 시스템 ── */
    /* 서브탭 */
    .policy-subtabs {
      display: flex; gap: 6px; margin-bottom: 18px;
      border-bottom: 2px solid var(--bd); padding-bottom: 0;
    }
    .policy-subtab {
      padding: 8px 18px; border-radius: 6px 6px 0 0; border: 1px solid transparent;
      background: none; font-size: 13px; font-weight: 600; color: var(--t3);
      cursor: pointer; transition: all .15s; margin-bottom: -2px;
    }
    .policy-subtab:hover { color: var(--t2); background: #f1f5f9; }
    .policy-subtab.active {
      color: var(--accent); background: #fff;
      border-color: var(--bd); border-bottom-color: #fff;
    }

    /* 통계 카드 */
    .policy-stat-grid {
      display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 20px;
    }
    @media(max-width:900px) { .policy-stat-grid { grid-template-columns: repeat(3, 1fr); } }
    .policy-stat-card {
      background: #fff; border: 1.5px solid var(--bd); border-radius: 10px;
      padding: 14px 16px; text-align: center;
      transition: box-shadow .15s;
    }
    .policy-stat-card.impact-high   { border-color: #fca5a5; background: #fff5f5; }
    .policy-stat-card.status-active { border-color: #86efac; background: #f0fdf4; }
    .policy-stat-card.status-pending{ border-color: #c4b5fd; background: #faf5ff; }
    .policy-stat-card.status-tracking{ border-color: #93c5fd; background: #eff6ff; }
    .policy-stat-label { font-size: 11px; color: var(--t3); font-weight: 600; margin-bottom: 6px; }
    .policy-stat-num   { font-size: 28px; font-weight: 800; color: var(--t1); line-height: 1; }

    /* 섹션 제목 */
    .policy-section-title {
      font-size: 13px; font-weight: 700; color: var(--t1);
      margin-bottom: 10px; padding-left: 2px;
    }
    .policy-empty {
      padding: 24px; text-align: center; font-size: 12px; color: var(--t3);
      border: 1px dashed var(--bd); border-radius: 8px;
      background: #fafbff; margin-bottom: 12px;
    }

    /* D-day 알림 카드 */
    .policy-alert-card {
      display: flex; align-items: flex-start; gap: 14px;
      padding: 12px 14px; border-radius: 8px; border: 1.5px solid;
      margin-bottom: 8px; background: #fff;
    }
    .policy-dday {
      font-size: 15px; font-weight: 800; min-width: 52px;
      text-align: center; flex-shrink: 0; padding-top: 2px;
    }
    .policy-alert-body { flex: 1; min-width: 0; }
    .policy-alert-name { font-size: 13px; font-weight: 700; color: var(--t1); margin-bottom: 2px; }
    .policy-alert-meta { font-size: 11px; color: var(--t3); margin-bottom: 2px; }
    .policy-alert-action { font-size: 11px; color: var(--t2); }

    /* DB 필터 바 */
    .policy-db-bar {
      display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .policy-select {
      padding: 5px 10px; border-radius: 6px; border: 1px solid var(--bd);
      font-size: 12px; color: var(--t2); background: #fff; cursor: pointer;
      font-family: inherit;
    }
    .policy-select:focus { outline: none; border-color: var(--accent2); }
    .policy-search-input {
      padding: 5px 12px; border-radius: 6px; border: 1px solid var(--bd);
      font-size: 12px; color: var(--t1); background: #fff; flex: 1; min-width: 120px;
      font-family: inherit;
    }
    .policy-search-input:focus { outline: none; border-color: var(--accent2); }

    /* 정책 아이템 카드 */
    .policy-item-card {
      background: #fff; border: 1px solid var(--bd); border-radius: 10px;
      padding: 14px 16px; margin-bottom: 10px; box-shadow: var(--sh-sm);
      transition: box-shadow .15s;
    }
    .policy-item-card:hover { box-shadow: var(--sh); border-color: var(--bd2); }
    .policy-item-top {
      display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 6px;
    }
    .policy-item-name {
      font-size: 14px; font-weight: 700; color: var(--t1); flex: 1; min-width: 0;
    }
    .policy-dday-sm {
      font-size: 11px; font-weight: 800; padding: 2px 8px; border-radius: 20px;
      flex-shrink: 0;
    }
    .policy-item-meta {
      font-size: 11px; color: var(--t3); margin-bottom: 6px;
    }
    .policy-item-content {
      font-size: 12px; color: var(--t2); line-height: 1.6; margin-bottom: 6px;
    }
    .policy-item-action {
      font-size: 11px; color: var(--t2); background: #f8faff;
      border: 1px solid var(--bd); border-radius: 6px;
      padding: 6px 10px; margin-bottom: 8px; line-height: 1.5;
      display: flex; gap: 8px;
    }
    .policy-item-foot {
      display: flex; align-items: center; gap: 8px; margin-top: 6px;
    }
    .policy-toggle-wrap {
      display: flex; align-items: center; gap: 5px;
      font-size: 11px; color: var(--t2); cursor: pointer; flex: 1;
    }
    .policy-toggle-wrap input { cursor: pointer; }

    /* 배지 */
    .policy-badge {
      font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 10px;
      white-space: nowrap; flex-shrink: 0; border: 1px solid transparent;
    }
    .policy-badge-type { background: var(--accent-lt); color: var(--accent); border-color: rgba(37,99,235,.2); }
    .policy-badge-area { background: #f1f5f9; color: var(--t2); border-color: var(--bd); }

    /* 캘린더 */
    .policy-cal-group-title {
      font-size: 12px; font-weight: 700; margin: 14px 0 6px;
      padding: 6px 12px; border-radius: 6px; border-left: 4px solid;
      background: #fafbff;
    }
    .policy-cal-item {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 10px 12px; border-radius: 8px; border: 1px solid var(--bd);
      background: #fff; margin-bottom: 6px;
    }
    .policy-cal-dday { font-size: 13px; font-weight: 800; min-width: 48px; text-align: center; flex-shrink: 0; }
    .policy-cal-label {
      font-size: 10px; font-weight: 700; color: var(--t3); min-width: 36px;
      text-align: center; flex-shrink: 0; padding-top: 2px;
    }
    .policy-cal-body { flex: 1; min-width: 0; }
    .policy-cal-name { font-size: 13px; font-weight: 700; color: var(--t1); margin-bottom: 2px; }
    .policy-cal-meta { font-size: 11px; color: var(--t3); margin-bottom: 2px; }
    .policy-cal-action { font-size: 11px; color: var(--t2); }

    /* 폼 */
    .policy-form-label {
      display: block; font-size: 11px; font-weight: 600; color: var(--t2);
      margin-bottom: 4px;
    }
    .policy-form-input {
      width: 100%; padding: 7px 10px; border-radius: 6px; border: 1px solid var(--bd);
      font-size: 12px; font-family: inherit; color: var(--t1); background: #fff;
      box-sizing: border-box;
    }
    .policy-form-input:focus { outline: none; border-color: var(--accent2); box-shadow: 0 0 0 2px rgba(37,99,235,.1); }
    textarea.policy-form-input { resize: vertical; min-height: 60px; }
  </style>
</head>

<body x-data="app()" x-init="init()">

  <!-- ── HEADER ── -->
  <header>
    <div class="hdr-logo">
      <div class="hdr-badge">WR</div>
      <span class="hdr-title">쿠콘 보도자료/언론기사 모니터링</span>
    </div>

    <div class="hdr-spacer"></div>
    <span class="hdr-date" x-text="today"></span>
    <button class="collect-btn primary" :disabled="collecting" @click="startCollect(activeCategory)">
      <span x-text="collecting ? '수집 중...' : '▶ 수집 시작'"></span>
    </button>
    <!-- 로그 패널 토글 -->
    <button class="log-toggle-btn" @click="showLog = !showLog"
      :title="showLog ? '로그 숨기기' : '로그 보기'">
      <span x-text="showLog ? '◀ 로그' : '로그 ▶'"></span>
    </button>
  </header>

  <!-- ── BODY ── -->
  <div id="wrap">

    <!-- ── SIDEBAR ── -->
    <aside class="sidebar">
      <div class="nav-item" :class="currentPage === 'home' ? 'active' : ''"
           @click="currentPage = 'home'">
        <span class="nav-icon">🏠</span>
        <span class="nav-label">HOME</span>
      </div>
      <div class="nav-item" :class="currentPage === 'history' ? 'active' : ''"
           @click="currentPage = 'history'; loadHistory()">
        <span class="nav-icon">📚</span>
        <span class="nav-label">HISTORY</span>
      </div>
      <div class="nav-item" :class="currentPage === 'policy' ? 'active' : ''"
           @click="currentPage = 'policy'; loadPolicy()">
        <span class="nav-icon">⚖️</span>
        <span class="nav-label">법규/정책</span>
      </div>
    </aside>

    <!-- ── MAIN ── -->
    <main class="main">

      <!-- ══ HOME ══ -->
      <template x-if="currentPage === 'home'">
        <div>

          <!-- 수집 기간 -->
          <div class="period-label">
            수집 대상 기간: <strong x-text="periodLabel"></strong>
          </div>

          <!-- 통계 박스 4개: 전체 → 데이터 → 페이먼트 → AML -->
          <div class="stat-grid">
            <div class="stat-box" :class="activeCategory === '전체' ? 'active-all' : ''"
                 @click="switchCategory('전체')">
              <div class="stat-label">전체</div>
              <div><span class="stat-num" x-text="totalCount"></span><span class="stat-unit">건</span></div>
            </div>
            <div class="stat-box" :class="activeCategory === '데이터' ? 'active-data' : ''"
                 @click="switchCategory('데이터')">
              <div class="stat-label">데이터</div>
              <div><span class="stat-num" x-text="allArticles['데이터'].length"></span><span class="stat-unit">건</span></div>
            </div>
            <div class="stat-box" :class="activeCategory === '페이먼트' ? 'active-pay' : ''"
                 @click="switchCategory('페이먼트')">
              <div class="stat-label">페이먼트</div>
              <div><span class="stat-num" x-text="allArticles['페이먼트'].length"></span><span class="stat-unit">건</span></div>
            </div>
            <div class="stat-box" :class="activeCategory === 'AML' ? 'active-aml' : ''"
                 @click="switchCategory('AML')">
              <div class="stat-label">AML</div>
              <div><span class="stat-num" x-text="allArticles['AML'].length"></span><span class="stat-unit">건</span></div>
            </div>
          </div>

          <!-- 검색창 (중앙) -->
          <div class="main-search-wrap">
            <div class="main-search">
              <span class="main-search-icon">🔍</span>
              <input type="text" x-model="searchQuery" placeholder="기사 검색..." />
            </div>
          </div>

          <!-- 통합 필터 행: 구분 | 우선순위 | 건수 -->
          <div class="filter-bar">
            <button class="src-btn" :class="articleType === '전체' ? 'active-all' : ''"
              @click="articleType = '전체'">전체</button>
            <button class="src-btn" :class="articleType === '보도자료' ? 'active-press' : ''"
              @click="articleType = '보도자료'">📋 보도자료</button>
            <button class="src-btn" :class="articleType === '언론기사' ? 'active-news' : ''"
              @click="articleType = '언론기사'">📰 언론기사</button>
            <div class="filter-divider"></div>
            <button class="pri-btn" :class="priorityFilter === '상' ? 'active-high' : ''"
              @click="togglePriority('상')">상</button>
            <button class="pri-btn" :class="priorityFilter === '중' ? 'active-mid' : ''"
              @click="togglePriority('중')">중</button>
            <button class="pri-btn" :class="priorityFilter === '하' ? 'active-low' : ''"
              @click="togglePriority('하')">하</button>
            <span class="filter-count"
              x-text="(activeCategory === '전체' ? filteredTotalCount : displayedArticles.length) + '건'"></span>
          </div>

          <!-- ── 전체 탭: 3컬럼 칸반 (데이터 | 페이먼트 | AML) ── -->
          <template x-if="activeCategory === '전체'">
            <div class="kanban-wrap">
              <template x-for="col in kanbanCols" :key="col.key">
                <div class="kanban-col">
                  <div class="kanban-col-header">
                    <span class="kanban-col-title" :class="'kc-' + col.key" x-text="col.label"></span>
                    <span class="kanban-col-count" x-text="col.articles.length + '건'"></span>
                  </div>
                  <template x-if="col.articles.length === 0">
                    <div class="empty-col">수집된 기사가 없습니다</div>
                  </template>
                  <template x-for="a in col.articles" :key="a._uid">
                    <div class="art-card">
                      <div class="art-card-top">
                        <span class="agency-badge" :class="sourceType(a)==='언론기사' ? 'badge-news' : badgeClass(col.key)" x-text="a['기관']"></span>
                        <span class="pri-badge"
                          :class="a['우선순위']==='상' ? 'pri-high' : a['우선순위']==='하' ? 'pri-low' : 'pri-mid'"
                          x-text="a['우선순위'] || '중'"></span>
                      </div>
                      <div class="art-card-title" x-html="highlight(a['제목'])"></div>
                      <div class="art-card-lead" x-html="highlight(a['내용'])"></div>
                      <div class="art-card-foot">
                        <span class="art-card-date" x-text="a['날짜']"></span>
                        <div class="art-card-btns">
                          <a x-show="a['링크']" :href="a['링크']" target="_blank" rel="noopener noreferrer"
                             @click.stop class="link-btn">원문</a>
                          <button class="row-btn" :disabled="formatting"
                            @click="formatSingle(a._idx, col.key)">
                            <span x-text="(formattingIdx === a._uid && formatting) ? '...' : '요약'"></span>
                          </button>
                        </div>
                      </div>
                    </div>
                  </template>
                </div>
              </template>
            </div>
          </template>

          <!-- ── 개별 탭 (데이터/페이먼트/AML): 3×N 카드 그리드 ── -->
          <template x-if="activeCategory !== '전체'">
            <div>
              <template x-if="currentArticles.length === 0">
                <div class="empty-list">수집된 보도자료가 없습니다 — 수집 시작 버튼을 눌러주세요</div>
              </template>
              <template x-if="displayedArticles.length === 0 && currentArticles.length > 0">
                <div class="empty-list">조건에 맞는 보도자료가 없습니다</div>
              </template>
              <div class="card-grid">
                <template x-for="a in displayedArticles" :key="a._uid">
                  <div class="art-card">
                    <div class="art-card-top">
                      <span class="agency-badge" :class="sourceType(a)==='언론기사' ? 'badge-news' : badgeClass(a._cat)" x-text="a['기관']"></span>
                      <span class="pri-badge"
                        :class="a['우선순위']==='상' ? 'pri-high' : a['우선순위']==='하' ? 'pri-low' : 'pri-mid'"
                        x-text="a['우선순위'] || '중'"></span>
                    </div>
                    <div class="art-card-title" x-html="highlight(a['제목'])"></div>
                    <div class="art-card-lead" x-html="highlight(a['내용'])"></div>
                    <div class="art-card-foot">
                      <span class="art-card-date" x-text="a['날짜']"></span>
                      <div class="art-card-btns">
                        <a x-show="a['링크']" :href="a['링크']" target="_blank" rel="noopener noreferrer"

    const KEYWORD_MAP = {
      '데이터':   ['인공지능','AI','마이데이터','개인정보','클라우드','데이터법','생성형AI','디지털전환','개보위','데이터경제'],
      '페이먼트': ['전자금융','핀테크','간편결제','지급결제','오픈뱅킹','가상자산','선불전자','가상계좌','입금이체','금융혁신'],
      'AML':      ['자금세탁방지','제재','과태료','FATF','FIU','의심거래','STR','특정금융','가상자산범죄','금융정보분석원'],
      '전체':     ['인공지능','AI','전자금융','핀테크','자금세탁방지','개인정보','가상자산','마이데이터','FIU','FATF'],
    };

    function periodLabel() {
      const WEEKDAY = ['일','월','화','수','목','금','토'];
      const fmt = d => {
        const y = String(d.getFullYear()).slice(2);
        const m = d.getMonth() + 1;
        const dd = d.getDate();
        const wd = WEEKDAY[d.getDay()];
        return `'${y}.${m}.${dd}(${wd})`;
      };
      const end = new Date();
      const start = new Date(end); start.setDate(start.getDate() - 6);
      return `${fmt(start)} ~ ${fmt(end)}`;
    }

    return {
      today: new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'short'}),
      periodLabel: periodLabel(),
      currentPage: 'home',
      historyItems: [],
      historyCat: '전체',
      historySearch: '',
      activeCategory: '전체',
      articleType: '전체',
      searchQuery: '',
      activeKeywords: [],
      priorityFilter: '',
      allArticles: { '데이터':[], '페이먼트':[], 'AML':[] },
      collecting: false,
      showLog: false,
      kukoniMsg: '보도자료 수집 중!',
      formatting: false,
      generating: false,
      formattedContent: '',
      showModal: false,
      modalCategory: '',
      pptResult: null,
      logs: [],
      formattingIdx: null,
      pptReadyUid: null,
      generatingUid: null,

      // 법규/정책 탭
      policyTab: 'dashboard',
      policyItems: [],
      policyFilterArea: '',
      policyFilterImpact: '',
      policyFilterStatus: '',
      policySearchKw: '',
      showPolicyForm: false,
      policyFormData: {},

      _applyFilters(list) {
        if (this.articleType !== '전체') {
          list = list.filter(a => this.sourceType(a) === this.articleType);
        }
        if (this.activeKeywords.length > 0) {
          list = list.filter(a =>
            this.activeKeywords.some(kw => (a['제목'] + a['내용']).includes(kw))
          );
        }
        if (this.searchQuery.trim()) {
          const q = this.searchQuery.trim().toLowerCase();
          list = list.filter(a =>
            (a['제목'] + a['내용'] + a['기관']).toLowerCase().includes(q)
          );
        }
        if (this.priorityFilter) {
          list = list.filter(a => a['우선순위'] === this.priorityFilter);
        }
        const rank = { '상': 0, '중': 1, '하': 2 };
        return [...list].sort((a, b) =>
          (rank[a['우선순위']] ?? 1) - (rank[b['우선순위']] ?? 1)
        );
      },

      get kanbanCols() {
        return ['데이터','페이먼트','AML'].map(cat => {
          const raw = (this.allArticles[cat] || []).map((a, i) => ({ ...a, _idx: i, _cat: cat, _uid: `${cat}-${i}` }));
          return { key: cat, label: cat, articles: this._applyFilters(raw) };
        });
      },

      get totalCount() {
        return (this.allArticles['데이터']?.length || 0)
             + (this.allArticles['페이먼트']?.length || 0)
             + (this.allArticles['AML']?.length || 0);
      },

      get filteredTotalCount() {
        return this.kanbanCols.reduce((s, col) => s + col.articles.length, 0);
      },

      get currentKeywords() { return KEYWORD_MAP[this.activeCategory] || []; },

      get currentChipClass() {
        if (this.activeCategory === '페이먼트') return 'pay-chip';
        if (this.activeCategory === 'AML') return 'aml-chip';
        return '';
      },

      get currentArticles() {
        if (this.activeCategory === '전체') {
          return ['데이터','페이먼트','AML'].flatMap(cat =>
            (this.allArticles[cat] || []).map((a, i) => ({ ...a, _idx: i, _cat: cat, _uid: `${cat}-${i}` }))
          );
        }
        const cat = this.activeCategory;
        return (this.allArticles[cat] || []).map((a, i) => ({ ...a, _idx: i, _cat: cat, _uid: `${cat}-${i}` }));
      },

      get displayedArticles() {
        return this._applyFilters(this.currentArticles);
      },

      sourceType(a) {
        if (a['구분']) return a['구분'];
        return a['기관'] === '네이버뉴스' ? '언론기사' : '보도자료';
      },

      badgeClass(cat) {
        if (cat === '페이먼트') return 'badge-pay';
        if (cat === 'AML') return 'badge-aml';
        return 'badge-data';
      },

      tagClass(cat) {
        if (cat === '페이먼트') return 'tag-pay';
        if (cat === 'AML') return 'tag-aml';
        return 'tag-data';
      },

      switchCategory(key) {
        this.activeCategory = key;
        this.activeKeywords = [];
        this.priorityFilter = '';
        this.searchQuery = '';
        this.pptReadyUid = null;
        this.articleType = '전체';
      },

      toggleKeyword(kw) {
        const i = this.activeKeywords.indexOf(kw);
        if (i === -1) this.activeKeywords.push(kw);
        else this.activeKeywords.splice(i, 1);
      },

      togglePriority(p) {
        this.priorityFilter = this.priorityFilter === p ? '' : p;
      },

      highlight(text) {
        if (!text) return '';
        let t = text.replace(/</g,'&lt;').replace(/>/g,'&gt;');
        const terms = [...this.activeKeywords];
        if (this.searchQuery.trim()) terms.push(this.searchQuery.trim());
        terms.forEach(kw => {
          if (!kw) return;
          const esc = kw.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
          t = t.replace(new RegExp(esc,'gi'), m => `<mark>${m}</mark>`);
        });
        return t;
      },

      // 법규/정책 computed
      get policyAreas() {
        return [...new Set(this.policyItems.map(p => p['사업영역']).filter(Boolean))].sort();
      },
      get filteredPolicyItems() {
        return this.policyItems.filter(p => {
          if (this.policyFilterArea   && p['사업영역'] !== this.policyFilterArea)   return false;
          if (this.policyFilterImpact && p['영향도']   !== this.policyFilterImpact) return false;
          if (this.policyFilterStatus && p['상태']     !== this.policyFilterStatus) return false;
          if (this.policySearchKw && !(p['정책명']||'').includes(this.policySearchKw)) return false;
          return true;
        });
      },
      get policyDdayAlerts() {
        const alerts = [];
        for (const p of this.policyItems) {
          const eff = p['시행일'];
          if (!eff || p['상태'] === '시행중') continue;
          const n = this._daysUntil(eff);
          if (n !== null && n >= 0 && n <= 180) {
            alerts.push({ ...p, _n: n, dday: n === 0 ? 'D-day' : `D-${n}`, color: n <= 30 ? '#dc2626' : n <= 90 ? '#d97706' : '#16a34a' });
          }
        }
        return alerts.sort((a,b) => a._n - b._n);
      },
      get policyDeadlineAlerts() {
        const alerts = [];
        for (const p of this.policyItems) {
          const dl = p['내부대응기한'];
          if (!dl) continue;
          const n = this._daysUntil(dl);
          if (n !== null && n >= 0 && n <= 90) {
            alerts.push({ ...p, _n: n, dday: n === 0 ? 'D-day' : `D-${n}`, color: n <= 14 ? '#dc2626' : '#d97706' });
          }
        }
        return alerts.sort((a,b) => a._n - b._n);
      },
      get policyCalendarItems() {
        const items = [];
        for (const p of this.policyItems.filter(p => p['트래킹여부']==='Y')) {
          for (const [field, label] of [['시행일','시행일'],['내부대응기한','내부기한']]) {
            const val = p[field];
            if (!val) continue;
            const n = this._daysUntil(val);
            if (n !== null) items.push({ ...p, _n: n, date: val, label, key: p.id + '_' + field, dday: n < 0 ? `D+${Math.abs(n)}` : n === 0 ? 'D-day' : `D-${n}` });
          }
        }
        return items.sort((a,b) => a._n - b._n);
      },
      get policyCalendarGroups() {
        const all = this.policyCalendarItems;
        return [
          { name: '이미 지남',  color: '#6b7280', items: all.filter(x => x._n < 0) },
          { name: '30일 이내',  color: '#dc2626', items: all.filter(x => x._n >= 0 && x._n <= 30) },
          { name: '31~90일',    color: '#d97706', items: all.filter(x => x._n > 30 && x._n <= 90) },
          { name: '91~180일',   color: '#2563eb', items: all.filter(x => x._n > 90 && x._n <= 180) },
          { name: '180일 이후', color: '#16a34a', items: all.filter(x => x._n > 180) },
        ];
      },

      // 법규/정책 메서드
      _daysUntil(dateStr) {
        try {
          const d = new Date(dateStr); const t = new Date();
          t.setHours(0,0,0,0); d.setHours(0,0,0,0);
          return Math.round((d - t) / 86400000);
        } catch { return null; }
      },
      policyDdayLabel(dateStr) {
        const n = this._daysUntil(dateStr);
        if (n === null) return '';
        if (n < 0) return `D+${Math.abs(n)}`;
        if (n === 0) return 'D-day';
        return `D-${n}`;
      },
      policyDdayColor(dateStr) {
        const n = this._daysUntil(dateStr);
        if (n === null) return '#6b7280';
        return n <= 30 ? '#dc2626' : n <= 90 ? '#d97706' : '#16a34a';
      },
      policyImpactStyle(val) {
        const c = val==='높음' ? '#dc2626' : val==='중간' ? '#d97706' : '#16a34a';
        return `background:${c}22;color:${c};border:1px solid ${c}44`;
      },
      policyStatusStyle(val) {
        const c = {'시행중':'#16a34a','시행예정':'#dc2626','계류중':'#7c3aed','입법예정':'#7c3aed','모니터링':'#6b7280'}[val] || '#6b7280';
        return `background:${c}22;color:${c};border:1px solid ${c}44`;
      },
      async loadPolicy() {
        try { this.policyItems = await fetch('/api/policydb').then(r => r.json()); }
        catch(_) { this.policyItems = []; }
      },
      openPolicyForm(p) {
        this.policyFormData = p ? { ...p } : { 구분:'법률', 영향도:'높음', 상태:'시행예정', 사업영역:'PG/결제', 모니터링주기:'월간', 트래킹여부:'Y' };
        this.showPolicyForm = true;
      },
      async savePolicyForm() {
        const d = this.policyFormData;
        if (!d['정책명']) { alert('정책명은 필수입니다.'); return; }
        if (d.id) {
          await fetch(`/api/policydb/${d.id}`, { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(d) });
        } else {
          await fetch('/api/policydb', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(d) });
        }
        this.showPolicyForm = false;
        await this.loadPolicy();
      },
      async toggleTracking(p) {
        p['트래킹여부'] = p['트래킹여부'] === 'Y' ? 'N' : 'Y';
        await fetch(`/api/policydb/${p.id}`, { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(p) });
        await this.loadPolicy();
      },
      async deletePolicy(id) {
        if (!confirm('삭제하시겠습니까?')) return;
        await fetch(`/api/policydb/${id}`, { method:'DELETE' });
        await this.loadPolicy();
      },

      async init() {
        await this.loadAll();
        setInterval(() => this.loadAll(), 10000);
      },

      async loadAll() {
        try {
          const data = await fetch('/api/articles/all').then(r => r.json());
          this.allArticles = { '데이터': data['데이터'] || [], '페이먼트': data['페이먼트'] || [], 'AML': data['AML'] || [] };
        } catch(_) {}
      },

      async loadHistory() {
        try {
          this.historyItems = await fetch('/api/history').then(r => r.json());
        } catch(_) { this.historyItems = []; }
      },

      get filteredHistory() {
        let items = this.historyItems;
        if (this.historyCat !== '전체') {
          items = items.filter(h => h.category === this.historyCat);
        }
        const q = this.historySearch.trim().toLowerCase();
        if (q) {
          items = items.filter(h =>
            (h.title || '').toLowerCase().includes(q) ||
            (h.summary || '').toLowerCase().includes(q)
          );
        }
        return items;
      },

      historyStatCount(cat) {
        if (cat === '전체') return this.historyItems.length;
        return this.historyItems.filter(h => h.category === cat).length;
      },

      async startCollect(type) {
        this.collecting = true;
        this.showLog = true;  // [S-1] 수집 시작 시 로그 패널 자동 열기
        const KUKONI_MSGS = [
          '보도자료 수집 중!', '열심히 찾는 중!', '잠깐만요~', '거의 다 됐어요!',
          '뉴스 탐색 중!', '데이터 수집 중!', '꼼꼼히 확인 중!',
        ];
        let msgIdx = 0;
        const msgTimer = setInterval(() => {
          msgIdx = (msgIdx + 1) % KUKONI_MSGS.length;
          this.kukoniMsg = KUKONI_MSGS[msgIdx];
        }, 2500);

        const es = new EventSource(`/api/stream/${encodeURIComponent(type)}`);
        es.onmessage = e => {
          if (e.data === '[DONE]') {
            es.close(); this.collecting = false;
            clearInterval(msgTimer);
            this.kukoniMsg = '수집 완료!';
            this._scroll();
            setTimeout(() => this.loadAll(), 800);
            return;
          }
          this.logs.push(e.data); this._scroll();
        };
        es.onerror = () => {
          if (es.readyState === EventSource.CLOSED) return;
          es.close(); this.collecting = false;
          clearInterval(msgTimer);
          this.logs.push(`[${type}] 연결 종료`);
        };
      },

      async formatSingle(idx, cat) {
        this.formatting = true;
        const uid = `${cat}-${idx}`;
        this.formattingIdx = uid;
        this.pptReadyUid = null;
        this.pptResult = null;
        this.formattedContent = '';
        this.logs.push(`[${cat}] 요약 중...`);
        try {
          const res = await fetch(`/api/format/${encodeURIComponent(cat)}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ indices: [idx] }),
          });
          const data = await res.json();
          if (!res.ok) { this.logs.push(`요약 오류: ${JSON.stringify(data.detail || data)}`); return; }
          this.formattedContent = data.content || '';
          this.modalCategory = cat;
          this.pptReadyUid = uid;
          this.showModal = true;
          this.logs.push(`요약 완료`);
          this._scroll();
        } catch(e) {
          this.logs.push(`요약 오류: ${e}`);
        } finally {
          this.formatting = false;
          this.formattingIdx = null;
        }
      },

      async generatePPTFor(uid) {
        this.generatingUid = uid;
        await this.generatePPT();
        this.generatingUid = null;
      },

      async generatePPT() {
        if (!this.formattedContent) return;
        this.generating = true; this.pptResult = null;
        this.logs.push(`[${this.modalCategory}] PPT 생성 중...`);
        try {
          const res = await fetch(`/api/generate/${encodeURIComponent(this.modalCategory)}`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ content: this.formattedContent }),
          });
          const data = await res.json();
          this.pptResult = data;
          this.logs.push(data.ok ? `PPT 저장: ${data.ppt_path}` : 'PPT 생성 실패');
          await this.loadAll();
        } catch(e) {
          this.logs.push(`오류: ${e}`);
        } finally { this.generating = false; this._scroll(); }
      },

      closeModal() {
        this.showModal = false;
        this.pptResult = null;
      },

      _scroll() {
        this.$nextTick(() => {
          const b = document.getElementById('logbox');
          if (b) b.scrollTop = b.scrollHeight;
        });
      },
    };
  }
  </script>
</body>
</html>
