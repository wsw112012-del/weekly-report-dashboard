                      :style="m === policyGanttCurrentMonth ? 'background:var(--accent-lt);color:var(--accent);font-weight:800' : ''"
                      x-text="m + '월'"></div>
                  </template>
                </div>
                <!-- 데이터 / 페이먼트 / AML 행 -->
                <template x-for="row in policyGanttRows" :key="row.cat">
                  <div class="gantt-row">
                    <div class="gantt-row-label">
                      <span class="gantt-label-text"
                        :style="row.cat==='데이터'?'color:var(--accent)':row.cat==='페이먼트'?'color:var(--pay-color)':'color:var(--aml-color)'"
                        x-text="row.cat"></span>
                    </div>
                    <template x-for="m in 12" :key="m">
                      <div class="gantt-cell"
                        :style="m === policyGanttCurrentMonth ? 'background:rgba(37,99,235,.04)' : ''">
                        <template x-for="p in row.byMonth[m]" :key="p.id">
                          <div class="gantt-pill"
                            :style="ganttPillStyle(p)"
                            :title="p['정책명'] + '\n상태: ' + p['상태'] + '\n시행일: ' + p['시행일']"
                            x-text="p['정책명'].length > 9 ? p['정책명'].slice(0,9)+'…' : p['정책명']">
                          </div>
                        </template>
                      </div>
                    </template>
                  </div>
                </template>
                <!-- 데이터 없을 때 -->
                <template x-if="!policyGanttHasData">
                  <div style="padding:20px;text-align:center;font-size:12px;color:var(--t3)">
                    <span x-text="policyGanttYear + '년 시행일이 설정된 정책이 없습니다.'"></span>
                  </div>
                </template>
              </div>

              <!-- D-day 알림 -->
              <div class="policy-section-title">📢 시행일 임박 알림 (180일 이내)</div>
              <template x-if="policyDdayAlerts.length === 0">
                <div class="policy-empty">향후 180일 내 시행 예정 정책이 없습니다.</div>
              </template>
              <template x-for="item in policyDdayAlerts" :key="item.id">
                <div class="policy-alert-card" :style="'border-color:' + item.color + ';background:' + item.color + '11'">
                  <span class="policy-dday" :style="'color:' + item.color" x-text="item.dday"></span>
                  <div class="policy-alert-body">
                    <div class="policy-alert-name" x-text="item['정책명']"></div>
                    <div class="policy-alert-meta" x-text="item['시행일'] + ' · ' + item['주무부처']"></div>
                    <div class="policy-alert-action" x-text="(item['쿠콘액션']||'').slice(0,100)"></div>
                  </div>
                </div>
              </template>

              <!-- 내부 대응 기한 -->
              <div class="policy-section-title" style="margin-top:20px">⏰ 내부 대응 기한 (90일 이내)</div>
              <template x-if="policyDeadlineAlerts.length === 0">
                <div class="policy-empty">90일 내 대응 기한이 없습니다.</div>
              </template>
              <template x-for="item in policyDeadlineAlerts" :key="item.id + '_dl'">
                <div class="policy-alert-card" :style="'border-color:' + item.color + ';background:' + item.color + '11'">
                  <span class="policy-dday" :style="'color:' + item.color" x-text="item.dday"></span>
                  <div class="policy-alert-body">
                    <div class="policy-alert-name" x-text="item['정책명']"></div>
                    <div class="policy-alert-meta" x-text="'담당: ' + (item['담당부서']||'')"></div>
                  </div>
                </div>
              </template>
            </div>
          </template>

          <!-- ── 정책 DB ── -->

  <!-- ── ALPINE ── -->
  <script>
  function app() {
    const KEYWORD_MAP = {
      '데이터':   ['인공지능','AI','마이데이터','개인정보','클라우드','데이터법','생성형AI','디지털전환','개보위','데이터경제'],
      '페이먼트': ['전자금융','핀테크','간편결제','지급결제','오픈뱅킹','가상자산','선불전자','가상계좌','입금이체','금융혁신'],
      'AML':      ['자금세탁방지','제재','과태료','FATF','FIU','의심거래','STR','특정금융','가상자산범죄','금융정보분석원'],
      '전체':     ['인공지능','AI','전자금융','핀테크','자금세탁방지','개인정보','가상자산','마이데이터','FIU','FATF'],
    };

    function periodLabel() {
      const WEEKDAY = ['일','월','화','수','목','금','토'];
      const fmt = d => {
        const y = String(d.getFullYear()).slice(2);
        const m = d.getMonth() + 1;
        const dd = d.getDate();
        const wd = WEEKDAY[d.getDay()];
        return `'${y}.${m}.${dd}(${wd})`;
      };
      const end = new Date();
      const start = new Date(end); start.setDate(start.getDate() - 6);
      return `${fmt(start)} ~ ${fmt(end)}`;
    }

    return {
      today: new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'short'}),
      periodLabel: periodLabel(),
      currentPage: 'home',
      historyItems: [],
      historyCat: '전체',
      historySearch: '',
      activeCategory: '전체',
      articleType: '전체',
      searchQuery: '',
      activeKeywords: [],
      priorityFilter: '',
      allArticles: { '데이터':[], '페이먼트':[], 'AML':[] },
      collecting: false,
      showLog: false,
      kukoniMsg: '보도자료 수집 중!',
      formatting: false,
      generating: false,
      formattedContent: '',
      showModal: false,
      modalCategory: '',
      pptResult: null,
      logs: [],
      formattingIdx: null,
      pptReadyUid: null,
      generatingUid: null,

      // 아티클 전체 목록 페이지
      articlesCategory: '데이터',
      articlesTypeFilter: '전체',
      articlesPriFilter: '',
      articlesSearchQ: '',

      // 법규/정책 탭
      policyTab: 'dashboard',
      policyItems: [],
      policyGanttYear: new Date().getFullYear(),
      policyFilterArea: '',
      policyFilterImpact: '',
      policyFilterStatus: '',
      policySearchKw: '',
      showPolicyForm: false,
      policyFormData: {},

      // 대응 캘린더
      calYear:  new Date().getFullYear(),
      calMonth: new Date().getMonth() + 1,
      calSelectedDate: (() => {
        const n = new Date();
        return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;
      })(),
      calFilterOrg: '',
      calFilterCat: '',

      _applyFilters(list) {
        if (this.articleType !== '전체') {
          list = list.filter(a => this.sourceType(a) === this.articleType);
        }
        if (this.activeKeywords.length > 0) {
          list = list.filter(a =>
            this.activeKeywords.some(kw => (a['제목'] + a['내용']).includes(kw))
          );
        }
        if (this.searchQuery.trim()) {
          const q = this.searchQuery.trim().toLowerCase();
          list = list.filter(a =>
            (a['제목'] + a['내용'] + a['기관']).toLowerCase().includes(q)
          );
        }
        if (this.priorityFilter) {
          list = list.filter(a => a['우선순위'] === this.priorityFilter);
        }
        const rank = { '상': 0, '중': 1, '하': 2 };
        return [...list].sort((a, b) =>
          (rank[a['우선순위']] ?? 1) - (rank[b['우선순위']] ?? 1)
        );
      },

      get kanbanCols() {
        return ['데이터','페이먼트','AML'].map(cat => {
          const raw = (this.allArticles[cat] || []).map((a, i) => ({ ...a, _idx: i, _cat: cat, _uid: `${cat}-${i}` }));
          return { key: cat, label: cat, articles: this._applyFilters(raw) };
        });
      },

      get totalCount() {
        return (this.allArticles['데이터']?.length || 0)
             + (this.allArticles['페이먼트']?.length || 0)
             + (this.allArticles['AML']?.length || 0);
      },

      get filteredTotalCount() {
        return this.kanbanCols.reduce((s, col) => s + col.articles.length, 0);
      },

      get featuredArticle() {
        return this.displayedArticles[0] || null;
      },
      get featuredBorderColor() {
        const cat = this.featuredArticle?._cat;
        if (cat === '페이먼트') return 'var(--pay-color)';
        if (cat === 'AML') return 'var(--aml-color)';
        return 'var(--accent2)';
      },
      get highPriorityCount() {
        return ['데이터','페이먼트','AML'].reduce((s, cat) =>
          s + (this.allArticles[cat] || []).filter(a => a['우선순위'] === '상').length, 0);
      },
      get pressCount() {
        return ['데이터','페이먼트','AML'].reduce((s, cat) =>
          s + (this.allArticles[cat] || []).filter(a => this.sourceType(a) === '보도자료').length, 0);
      },
      get newsCount() {
        return ['데이터','페이먼트','AML'].reduce((s, cat) =>
          s + (this.allArticles[cat] || []).filter(a => this.sourceType(a) === '언론기사').length, 0);
      },
      get homeDailyTopItems() {
        const date = this.calSelectedDate;
        if (!date) return [];
        const result = [];
        for (const cat of ['데이터', '페이먼트', 'AML']) {
          const items = (this.allArticles[cat] || [])
            .filter(a => (a['날짜']||'').startsWith(date) && a['우선순위'] === '상')
            .slice(0, 3)
            .map((a, i) => ({ ...a, _idx: i, _cat: cat, _uid: `${cat}-${i}` }));
          if (items.length > 0) result.push({ cat, items });
        }
        return result;
      },
      homeDailyColItems(cat) {
        const date = this.calSelectedDate;
        if (!date) return [];
        const seen = new Set();
        return (this.allArticles[cat] || [])
          .filter(a => {
            if (!(a['날짜']||'').startsWith(date)) return false;
            if (a['우선순위'] !== '상') return false;
            if (this.sourceType(a) !== '보도자료') return false;
            const key = (a['제목']||'').trim();
            if (seen.has(key)) return false;
            seen.add(key);
            return true;
          })
          .slice(0, 3)
          .map((a, i) => ({ ...a, _idx: i, _cat: cat, _uid: `${cat}-${i}` }));
      },
      get homeCalDotDates() {
        const set = new Set();
        const prefix = `${this.calYear}-${String(this.calMonth).padStart(2,'0')}`;
        for (const arts of Object.values(this.allArticles)) {
          for (const a of arts) {
            const d = a['날짜'] || '';
            if (d.startsWith(prefix) && a['우선순위'] === '상') set.add(d);
          }
        }
        return set;
      },
      get catGridStyle() {
        if (this.activeCategory === '전체') return 'grid-template-columns: repeat(3, 1fr)';
        const order = ['데이터', '페이먼트', 'AML'];
        return 'grid-template-columns: ' + order.map(c => c === this.activeCategory ? '2fr' : '0.75fr').join(' ');
      },
      catColClass(cat) {
        if (this.activeCategory === '전체') return '';
        if (cat === this.activeCategory) {
          const suffix = cat === 'AML' ? 'aml' : cat === '페이먼트' ? 'pay' : 'data';
          return `col-active col-active-${suffix}`;
        }
        return 'col-inactive';
      },

      get currentKeywords() { return KEYWORD_MAP[this.activeCategory] || []; },

      get currentChipClass() {
        if (this.activeCategory === '페이먼트') return 'pay-chip';
        if (this.activeCategory === 'AML') return 'aml-chip';
        return '';
      },

      get currentArticles() {
        if (this.activeCategory === '전체') {
          return ['데이터','페이먼트','AML'].flatMap(cat =>
            (this.allArticles[cat] || []).map((a, i) => ({ ...a, _idx: i, _cat: cat, _uid: `${cat}-${i}` }))
          );
        }
        const cat = this.activeCategory;
        return (this.allArticles[cat] || []).map((a, i) => ({ ...a, _idx: i, _cat: cat, _uid: `${cat}-${i}` }));
      },

      get displayedArticles() {
        return this._applyFilters(this.currentArticles);
      },

      sourceType(a) {
        if (a['구분']) return a['구분'];
        return a['기관'] === '네이버뉴스' ? '언론기사' : '보도자료';
      },

      badgeClass(cat) {
        if (cat === '페이먼트') return 'badge-pay';
        if (cat === 'AML') return 'badge-aml';
        return 'badge-data';
      },

      tagClass(cat) {
        if (cat === '페이먼트') return 'tag-pay';
        if (cat === 'AML') return 'tag-aml';
        return 'tag-data';
      },

      openArticlesPage(cat) {
        this.articlesCategory = cat;
        this.articlesTypeFilter = '전체';
        this.articlesPriFilter = '';
        this.articlesSearchQ = '';
        this.currentPage = 'articles';
      },

      articlesPageItems(typeFilter) {
        return (this.allArticles[this.articlesCategory] || [])
          .map((a, i) => ({ ...a, _idx: i, _cat: this.articlesCategory, _uid: `${this.articlesCategory}-${i}` }))
          .filter(a => typeFilter === '전체' || this.sourceType(a) === typeFilter);
      },

      get articlesFiltered() {
        let items = this.articlesPageItems(this.articlesTypeFilter);
        if (this.articlesPriFilter) items = items.filter(a => a['우선순위'] === this.articlesPriFilter);
        const q = this.articlesSearchQ.trim().toLowerCase();
        if (q) items = items.filter(a =>
          (a['제목']||'').toLowerCase().includes(q) || (a['내용']||'').toLowerCase().includes(q)
        );
        return items;
      },

      highlightQ(text, q) {
        if (!q || !text) return text || '';
        const escaped = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        return text.replace(new RegExp(escaped, 'gi'), m => `<mark>${m}</mark>`);
      },

      switchCategory(key) {
        this.activeCategory = key;
        this.activeKeywords = [];
        this.priorityFilter = '';
        this.searchQuery = '';
        this.pptReadyUid = null;
        this.articleType = '전체';
      },

      toggleKeyword(kw) {
        const i = this.activeKeywords.indexOf(kw);
        if (i === -1) this.activeKeywords.push(kw);
        else this.activeKeywords.splice(i, 1);
      },

      togglePriority(p) {
        this.priorityFilter = this.priorityFilter === p ? '' : p;
      },

      highlight(text) {
        if (!text) return '';
        // HTML 엔티티 디코딩 (이중 인코딩 &amp;quot; → &quot; → " 까지 처리)
        const tmp = document.createElement('div');
        tmp.innerHTML = text;
        let decoded = tmp.textContent || tmp.innerText || text;
        tmp.innerHTML = decoded;
        decoded = tmp.textContent || tmp.innerText || decoded;
        let t = decoded.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        const terms = [...this.activeKeywords];
        if (this.searchQuery.trim()) terms.push(this.searchQuery.trim());
        terms.forEach(kw => {
          if (!kw) return;
          const esc = kw.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
          t = t.replace(new RegExp(esc,'gi'), m => `<mark>${m}</mark>`);
        });
        return t;
      },

      // ── 대응 캘린더 computed + methods ──
      _calLegKw: ['개정','시행','제정','법률','법안','입법','고시','훈령','규제','의무화','제도','금지','처벌','과태료'],

      _calTodayStr() {
        const n = new Date();
        return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;
      },
      _areaToCat(area) {
        const MAP = { 'AML/KYC':'AML','PG/결제':'페이먼트','스크래핑':'페이먼트','가상자산':'페이먼트' };
        return MAP[area] || '데이터';
      },
      calPrevMonth() {
        if (this.calMonth === 1) { this.calYear--; this.calMonth = 12; }
        else this.calMonth--;
      },
      calNextMonth() {
        if (this.calMonth === 12) { this.calYear++; this.calMonth = 1; }
        else this.calMonth++;
      },
      calGoToday() {
        const n = new Date();
        this.calYear = n.getFullYear(); this.calMonth = n.getMonth() + 1;
        this.calSelectedDate = this._calTodayStr();
      },

      get calDays() {
        const firstDay = new Date(this.calYear, this.calMonth - 1, 1).getDay();
        const daysInMonth = new Date(this.calYear, this.calMonth, 0).getDate();
        const cells = [];
        for (let i = 0; i < firstDay; i++) cells.push(null);
        for (let d = 1; d <= daysInMonth; d++) {
          const mm = String(this.calMonth).padStart(2,'0'), dd = String(d).padStart(2,'0');
          cells.push({ d, dateStr: `${this.calYear}-${mm}-${dd}` });
        }
        return cells;
      },

      get calMonthEventDates() {
        const set = new Set();
        const prefix = `${this.calYear}-${String(this.calMonth).padStart(2,'0')}`;
        for (const p of this.policyItems) {
          if ((p['시행일']||'').startsWith(prefix)) set.add(p['시행일']);
          if ((p['공포일']||'').startsWith(prefix)) set.add(p['공포일']);
        }
        for (const arts of Object.values(this.allArticles)) {
          for (const a of arts) {
            const d = a['날짜']||'';
            if (!d.startsWith(prefix)) continue;
            if (this._calLegKw.some(kw => (a['제목']||'').includes(kw))) set.add(d);
          }
        }
        return set;
      },

      get calSelectedItems() {
        const date = this.calSelectedDate;
        if (!date) return [];
        const items = [];
        for (const p of this.policyItems) {
          let eventType = null;
          if (p['시행일'] === date) eventType = '시행';
          else if (p['공포일'] === date) eventType = '공포';
          if (!eventType) continue;
          const cat = this._areaToCat(p['사업영역']);
          if (this.calFilterCat && cat !== this.calFilterCat) continue;
          if (this.calFilterOrg && p['주무부처'] !== this.calFilterOrg) continue;
          items.push({ eventType, cat, org: p['주무부처']||'', title: p['정책명']||'', summary: p['핵심내용']||'', link: p['출처URL']||'', status: p['상태']||'' });
        }
        for (const [cat, arts] of Object.entries(this.allArticles)) {
          for (const a of arts) {
            if ((a['날짜']||'') !== date) continue;
            if (!this._calLegKw.some(kw => (a['제목']||'').includes(kw))) continue;
            if (this.calFilterCat && cat !== this.calFilterCat) continue;
            if (this.calFilterOrg && a['기관'] !== this.calFilterOrg) continue;
            items.push({ eventType: '보도', cat, org: a['기관']||'', title: a['제목']||'', summary: (a['내용']||'').slice(0,200), link: a['링크']||'', status: '' });
          }
        }
        return items;
      },

      get calOrgList() {
        const orgs = new Set();
        for (const p of this.policyItems) { if (p['주무부처']) orgs.add(p['주무부처']); }
        for (const arts of Object.values(this.allArticles)) {
          for (const a of arts) {
            const org = a['기관']||'';
            if (org && org !== '네이버뉴스') orgs.add(org);
          }
        }
        return [...orgs].sort();
      },

      // 법규/정책 computed
      get policyGanttRows() {
        const AREA_TO_CAT = {
          'AML/KYC': 'AML',
          'PG/결제': '페이먼트', '스크래핑': '페이먼트', '가상자산': '페이먼트',
        };
        const getCat = area => AREA_TO_CAT[area] || '데이터';
        const yr = this.policyGanttYear;
        return ['데이터', '페이먼트', 'AML'].map(cat => {
          const byMonth = {};
          for (let m = 1; m <= 12; m++) byMonth[m] = [];
          for (const p of this.policyItems) {
            if (getCat(p['사업영역']) !== cat) continue;
            const d = p['시행일'];
            if (!d) continue;
            const [y, m] = d.split('-').map(Number);
            if (y === yr && m >= 1 && m <= 12) byMonth[m].push(p);
          }
          return { cat, byMonth };
        });
      },
      get policyGanttHasData() {
        return this.policyGanttRows.some(row =>
          Object.values(row.byMonth).some(arr => arr.length > 0)
        );
      },
      get policyGanttCurrentMonth() {
        const now = new Date();
        return now.getFullYear() === this.policyGanttYear ? now.getMonth() + 1 : -1;
      },
      ganttPillStyle(p) {
        const n = this._daysUntil(p['시행일']);
        const s = p['상태'];
        if (n !== null && n < 0)                       return 'background:#94a3b8;color:#fff';
        if (s === '시행중')                              return 'background:#16a34a;color:#fff';
        if (s === '계류중' || s === '입법예정')           return 'background:#7c3aed;color:#fff';
        if (s === '모니터링')                            return 'background:#64748b;color:#fff';
        if (n !== null && n <= 30)                      return 'background:#dc2626;color:#fff';
        if (n !== null && n <= 90)                      return 'background:#d97706;color:#fff';
        return 'background:#2563eb;color:#fff';
      },
      get policyAreas() {
        return [...new Set(this.policyItems.map(p => p['사업영역']).filter(Boolean))].sort();
      },
      get policyDbCols() {
        const groups = {};
        for (const p of this.filteredPolicyItems) {
          const area = p['사업영역'] || '기타';
          if (!groups[area]) groups[area] = [];
          groups[area].push(p);
        }
        const catColor = cat => cat === 'AML' ? 'var(--aml-color)' : cat === '페이먼트' ? 'var(--pay-color)' : 'var(--accent)';
        return Object.entries(groups)
          .sort(([a], [b]) => a === '기타' ? 1 : b === '기타' ? -1 : a.localeCompare(b, 'ko'))
          .map(([area, items]) => {
            const cat = this._areaToCat(area);
            return { area, items, color: catColor(cat) };
          });
      },
      get filteredPolicyItems() {
        return this.policyItems.filter(p => {
          if (this.policyFilterArea   && p['사업영역'] !== this.policyFilterArea)   return false;
          if (this.policyFilterImpact && p['영향도']   !== this.policyFilterImpact) return false;
          if (this.policyFilterStatus && p['상태']     !== this.policyFilterStatus) return false;
          if (this.policySearchKw && !(p['정책명']||'').includes(this.policySearchKw)) return false;
          return true;
        });
      },
      get policyDdayAlerts() {
        const alerts = [];
        for (const p of this.policyItems) {
          const eff = p['시행일'];
          if (!eff || p['상태'] === '시행중') continue;
          const n = this._daysUntil(eff);
          if (n !== null && n >= 0 && n <= 180) {
            alerts.push({ ...p, _n: n, dday: n === 0 ? 'D-day' : `D-${n}`, color: n <= 30 ? '#dc2626' : n <= 90 ? '#d97706' : '#16a34a' });
          }
        }
        return alerts.sort((a,b) => a._n - b._n);
      },
      get policyDeadlineAlerts() {
        const alerts = [];
        for (const p of this.policyItems) {
          const dl = p['내부대응기한'];
          if (!dl) continue;
          const n = this._daysUntil(dl);
          if (n !== null && n >= 0 && n <= 90) {
            alerts.push({ ...p, _n: n, dday: n === 0 ? 'D-day' : `D-${n}`, color: n <= 14 ? '#dc2626' : '#d97706' });
          }
        }
        return alerts.sort((a,b) => a._n - b._n);
      },
      get policyCalendarItems() {
        const items = [];
        for (const p of this.policyItems.filter(p => p['트래킹여부']==='Y')) {
          for (const [field, label] of [['시행일','시행일'],['내부대응기한','내부기한']]) {
            const val = p[field];
            if (!val) continue;
            const n = this._daysUntil(val);
            if (n !== null) items.push({ ...p, _n: n, date: val, label, key: p.id + '_' + field, dday: n < 0 ? `D+${Math.abs(n)}` : n === 0 ? 'D-day' : `D-${n}` });
          }
        }
        return items.sort((a,b) => a._n - b._n);
      },
      get policyCalendarGroups() {
        const all = this.policyCalendarItems;
        return [
          { name: '이미 지남',  color: '#6b7280', items: all.filter(x => x._n < 0) },
          { name: '30일 이내',  color: '#dc2626', items: all.filter(x => x._n >= 0 && x._n <= 30) },
          { name: '31~90일',    color: '#d97706', items: all.filter(x => x._n > 30 && x._n <= 90) },
          { name: '91~180일',   color: '#2563eb', items: all.filter(x => x._n > 90 && x._n <= 180) },
          { name: '180일 이후', color: '#16a34a', items: all.filter(x => x._n > 180) },
        ];
      },

      // 법규/정책 메서드
      _daysUntil(dateStr) {
        try {
          if (!dateStr) return null;
          const d = new Date(dateStr);
          if (isNaN(d.getTime())) return null;
          const t = new Date();
          t.setHours(0,0,0,0); d.setHours(0,0,0,0);
          return Math.round((d - t) / 86400000);
        } catch { return null; }
      },
      policyDdayLabel(dateStr) {
        const n = this._daysUntil(dateStr);
        if (n === null) return '';
        if (n < 0) return `D+${Math.abs(n)}`;
        if (n === 0) return 'D-day';
        return `D-${n}`;
      },
      policyDdayColor(dateStr) {
        const n = this._daysUntil(dateStr);
        if (n === null) return '#6b7280';
        return n <= 30 ? '#dc2626' : n <= 90 ? '#d97706' : '#16a34a';
      },
      policyImpactStyle(val) {
        const c = val==='높음' ? '#dc2626' : val==='중간' ? '#d97706' : '#16a34a';
        return `background:${c}22;color:${c};border:1px solid ${c}44`;
      },
      policyStatusStyle(val) {
        const c = {'시행중':'#16a34a','시행예정':'#dc2626','계류중':'#7c3aed','입법예정':'#7c3aed','모니터링':'#6b7280'}[val] || '#6b7280';
        return `background:${c}22;color:${c};border:1px solid ${c}44`;
      },
      async loadPolicy() {
        try { this.policyItems = await fetch('/api/policydb').then(r => r.json()); }
        catch(_) { this.policyItems = []; }
      },
      openPolicyForm(p) {
        this.policyFormData = p ? { ...p } : { 구분:'법률', 영향도:'높음', 상태:'시행예정', 사업영역:'PG/결제', 모니터링주기:'월간', 트래킹여부:'Y' };
        this.showPolicyForm = true;
      },
      async savePolicyForm() {
        const d = this.policyFormData;
        if (!d['정책명']) { alert('정책명은 필수입니다.'); return; }
        if (d.id) {
          await fetch(`/api/policydb/${d.id}`, { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(d) });
        } else {
          await fetch('/api/policydb', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(d) });
        }
        this.showPolicyForm = false;
        await this.loadPolicy();
      },
      async toggleTracking(p) {
        p['트래킹여부'] = p['트래킹여부'] === 'Y' ? 'N' : 'Y';
        await fetch(`/api/policydb/${p.id}`, { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(p) });
        await this.loadPolicy();
      },
      async deletePolicy(id) {
        if (!confirm('삭제하시겠습니까?')) return;
        await fetch(`/api/policydb/${id}`, { method:'DELETE' });
        await this.loadPolicy();
      },

      async init() {
        await this.loadAll();
        setInterval(() => this.loadAll(), 10000);
      },

      async loadAll() {
        try {
          const data = await fetch('/api/articles/all').then(r => r.json());
          this.allArticles = { '데이터': data['데이터'] || [], '페이먼트': data['페이먼트'] || [], 'AML': data['AML'] || [] };
        } catch(_) {}
      },

      async loadHistory() {
        try {
          this.historyItems = await fetch('/api/history').then(r => r.json());
        } catch(_) { this.historyItems = []; }
      },

      get filteredHistory() {
        let items = this.historyItems;
        if (this.historyCat !== '전체') {
          items = items.filter(h => h.category === this.historyCat);
        }
        const q = this.historySearch.trim().toLowerCase();
        if (q) {
          items = items.filter(h =>
            (h.title || '').toLowerCase().includes(q) ||
            (h.summary || '').toLowerCase().includes(q)
          );
        }
        return items;
      },

      historyStatCount(cat) {
        if (cat === '전체') return this.historyItems.length;
        return this.historyItems.filter(h => h.category === cat).length;
      },

      async startCollect(type) {
        this.collecting = true;
        this.showLog = true;  // [S-1] 수집 시작 시 로그 패널 자동 열기
        const KUKONI_MSGS = [
          '보도자료 수집 중!', '열심히 찾는 중!', '잠깐만요~', '거의 다 됐어요!',
          '뉴스 탐색 중!', '데이터 수집 중!', '꼼꼼히 확인 중!',
        ];
        let msgIdx = 0;
        const msgTimer = setInterval(() => {
          msgIdx = (msgIdx + 1) % KUKONI_MSGS.length;
          this.kukoniMsg = KUKONI_MSGS[msgIdx];
        }, 2500);

        const es = new EventSource(`/api/stream/${encodeURIComponent(type)}`);
        es.onmessage = e => {
          if (e.data === '[DONE]') {
            es.close(); this.collecting = false;
            clearInterval(msgTimer);
            this.kukoniMsg = '수집 완료!';
            this._scroll();
            setTimeout(() => this.loadAll(), 800);
            return;
          }
          this.logs.push(e.data); this._scroll();
        };
        es.onerror = () => {
          if (es.readyState === EventSource.CLOSED) return;
          es.close(); this.collecting = false;
          clearInterval(msgTimer);
          this.logs.push(`[${type}] 연결 종료`);
        };
      },

      async formatSingle(idx, cat) {
        this.formatting = true;
        const uid = `${cat}-${idx}`;
        this.formattingIdx = uid;
        this.pptReadyUid = null;
        this.pptResult = null;
        this.formattedContent = '';
        this.logs.push(`[${cat}] 요약 중...`);
        try {
          const res = await fetch(`/api/format/${encodeURIComponent(cat)}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ indices: [idx] }),
          });
          const data = await res.json();
          if (!res.ok) { this.logs.push(`요약 오류: ${JSON.stringify(data.detail || data)}`); return; }
          this.formattedContent = data.content || '';
          this.modalCategory = cat;
          this.pptReadyUid = uid;
          this.showModal = true;
          this.logs.push(`요약 완료`);
          this._scroll();
        } catch(e) {
          this.logs.push(`요약 오류: ${e}`);
        } finally {
          this.formatting = false;
          this.formattingIdx = null;
        }
      },

      async generatePPTFor(uid) {
        this.generatingUid = uid;
        await this.generatePPT();
        this.generatingUid = null;
      },

      async generatePPT() {
        if (!this.formattedContent) return;
        this.generating = true; this.pptResult = null;
        this.logs.push(`[${this.modalCategory}] PPT 생성 중...`);
        try {
          const res = await fetch(`/api/generate/${encodeURIComponent(this.modalCategory)}`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ content: this.formattedContent }),
          });
          const data = await res.json();
          this.pptResult = data;
          this.logs.push(data.ok ? `PPT 저장: ${data.ppt_path}` : 'PPT 생성 실패');
          await this.loadAll();
        } catch(e) {
          this.logs.push(`오류: ${e}`);
        } finally { this.generating = false; this._scroll(); }
      },

      closeModal() {
        this.showModal = false;
        this.pptResult = null;
      },

      _scroll() {
        this.$nextTick(() => {
          const b = document.getElementById('logbox');
          if (b) b.scrollTop = b.scrollHeight;
        });
      },
    };
  }
  </script>
</body>
</html>
