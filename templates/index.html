<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>쿠콘 보도자료/언론기사 모니터링</title>
  <link rel="icon" type="image/x-icon" href="/static/favicon.ico" />
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #f0f4fb;
      --bg-card:    #ffffff;
      --accent:     #1e40af;
      --accent2:    #2563eb;
      --accent-lt:  #dbeafe;
      --aml-color:  #b91c1c;
      --aml-lt:     #fee2e2;
      --pay-color:  #0f766e;
      --pay-lt:     #ccfbf1;
      --accent-grd: linear-gradient(135deg,#1e3a8a,#2563eb);
      --aml-grd:    linear-gradient(135deg,#b91c1c,#ea580c);
      --pay-grd:    linear-gradient(135deg,#0f766e,#0891b2);
      --nav-bg:     #ffffff;
      --sidebar-bg: #ffffff;
      --bd:         #d1ddf0;
      --bd2:        #93afd4;
      --t1:         #0f172a;
      --t2:         #334155;
      --t3:         #64748b;
      --sh-sm:      0 1px 2px rgba(15,23,42,.06);
      --sh:         0 1px 4px rgba(15,23,42,.09),0 1px 2px rgba(15,23,42,.05);
      --sh-md:      0 4px 12px rgba(15,23,42,.08),0 2px 4px rgba(15,23,42,.04);
    }

    html, body { height: 100%; }
    body {
      font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
      background: var(--bg); color: var(--t1);
      display: flex; flex-direction: column; overflow: hidden;
    }

    /* ── HEADER ── */
    header {
      height: 64px; flex-shrink: 0;
      display: flex; align-items: center; gap: 12px;
      padding: 0 20px 0 20px;
      background: var(--nav-bg);
      border-bottom: 1px solid var(--bd);
      box-shadow: 0 1px 6px rgba(15,23,42,.07);
      z-index: 100; overflow: visible;
    }
    .hdr-logo {
      display: flex; align-items: center; gap: 9px; flex-shrink: 0;
    }
    .hdr-badge {
      width: 30px; height: 30px; border-radius: 8px;
      background: var(--accent-grd);
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 800; color: #fff; letter-spacing: -.5px;
    }
    .hdr-title { font-size: 14px; font-weight: 700; color: var(--t1); letter-spacing: -.2px; }
    .hdr-spacer { flex: 1; }
    .hdr-date { font-size: 11px; color: var(--t3); margin-right: 8px; }

    /* 로그 패널 쿠코니 캐릭터 */
    .log-kukoni-wrap {
      position: relative; flex-shrink: 0;
      border-top: 1px solid var(--bd);
      background: #fff;
      display: flex; align-items: center; justify-content: center;
      padding: 8px 0 4px;
    }
    .log-kukoni-wrap video {
      height: 120px; width: auto; object-fit: contain;
      background: #ffffff;
      mix-blend-mode: multiply;
      filter: brightness(1.08) contrast(0.95);
    }
    .log-kukoni-bubble {
      position: absolute; top: 10px; right: 8px;
      background: #fff; border: 1.5px solid var(--accent-lt);
      border-radius: 10px 10px 0 10px;
      padding: 3px 9px; font-size: 10px; font-weight: 600; color: var(--accent);
      white-space: nowrap; box-shadow: var(--sh-sm);
      animation: pop .25s ease;
    }
    @keyframes pop { from{opacity:0;transform:scale(.8)} to{opacity:1;transform:scale(1)} }

    .collect-btn {
      padding: 7px 16px; border-radius: 8px; border: none;
      font-size: 12px; font-weight: 700; cursor: pointer;
      transition: all .18s; white-space: nowrap; color: #fff;
      display: flex; align-items: center; gap: 5px;
    }
    .collect-btn.primary { background: var(--accent2); }
    .collect-btn:hover:not(:disabled) { filter: brightness(1.1); box-shadow: var(--sh); }
    .collect-btn:disabled { opacity: .5; cursor: not-allowed; }

    /* 로그 토글 버튼 */
    .log-toggle-btn {
      padding: 6px 12px; border-radius: 8px;
      border: 1px solid var(--bd); background: #f8faff;
      color: var(--t2); font-size: 11px; font-weight: 600;
      cursor: pointer; transition: all .15s;
      display: flex; align-items: center; gap: 5px; white-space: nowrap;
    }
    .log-toggle-btn:hover { background: var(--accent-lt); border-color: var(--accent2); color: var(--accent); }

    /* ── BODY WRAP ── */
    #wrap { display: flex; flex: 1; overflow: hidden; }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 140px; flex-shrink: 0;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--bd);
      padding: 16px 8px;
      display: flex; flex-direction: column; gap: 4px;
    }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: 8px;
      cursor: pointer; font-size: 13px; font-weight: 600; color: var(--t2);
      transition: all .15s; border: 1px solid transparent;
      user-select: none;
    }
    .nav-item:hover { background: #f1f5f9; color: var(--t1); }
    .nav-item.active { background: var(--accent-lt); color: var(--accent); border-color: rgba(37,99,235,.2); }
    .nav-icon { font-size: 18px; flex-shrink: 0; }
    .nav-label { font-size: 13px; font-weight: 600; }

    /* 사이드바 서브메뉴 */
    .nav-sub-group { display: flex; flex-direction: column; gap: 2px; padding-left: 8px; }
    .nav-sub-item {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 10px; border-radius: 7px;
      cursor: pointer; font-size: 12px; font-weight: 600; color: var(--t3);
      transition: all .15s; border: 1px solid transparent;
      user-select: none;
    }
    .nav-sub-item:hover { background: #f1f5f9; color: var(--t1); }
    .nav-sub-item.active { color: var(--accent); background: var(--accent-lt); border-color: rgba(37,99,235,.15); }
    .nav-sub-item.active.sub-pay { color: var(--pay-color); background: var(--pay-lt); border-color: rgba(15,118,110,.15); }
    .nav-sub-item.active.sub-aml { color: var(--aml-color); background: var(--aml-lt); border-color: rgba(185,28,28,.15); }
    .nav-sub-dot {
      width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
    }
    .dot-data { background: var(--accent); }
    .dot-pay  { background: var(--pay-color); }
    .dot-aml  { background: var(--aml-color); }
    .nav-sub-count { font-size: 10px; margin-left: auto; font-weight: 700; opacity: .7; }

    /* 아티클 전체 목록 페이지 */
    .articles-page { padding: 0; }
    .articles-page-header {
      display: flex; align-items: center; gap: 10px; margin-bottom: 16px;
    }
    .articles-back-btn {
      padding: 6px 12px; border-radius: 7px; border: 1px solid var(--bd);
      background: #fff; font-size: 12px; font-weight: 600; color: var(--t2);
      cursor: pointer; transition: all .15s; display: flex; align-items: center; gap: 4px;
    }
    .articles-back-btn:hover { background: #f1f5f9; border-color: var(--bd2); }
    .articles-page-title { font-size: 16px; font-weight: 800; color: var(--t1); }
    .articles-type-tabs {
      display: flex; gap: 4px; margin-bottom: 14px;
    }
    .articles-type-tab {
      padding: 7px 18px; border-radius: 8px; border: 1.5px solid var(--bd);
      background: #fff; font-size: 12px; font-weight: 700; color: var(--t3);
      cursor: pointer; transition: all .15s;
    }
    .articles-type-tab:hover { border-color: var(--bd2); color: var(--t2); }
    .articles-type-tab.active {
      background: var(--accent-lt); border-color: var(--accent2); color: var(--accent);
    }
    .articles-type-tab.active.tab-news { background: #f3e8ff; border-color: #7c3aed; color: #6d28d9; }
    .articles-filter-bar {
      display: flex; align-items: center; gap: 6px; margin-bottom: 14px; flex-wrap: wrap;
    }
    .articles-search {
      display: flex; align-items: center; gap: 6px;
      border: 1px solid var(--bd); border-radius: 7px;
      padding: 0 10px; height: 32px; background: #fff; flex: 1; min-width: 160px;
      transition: border-color .15s;
    }
    .articles-search:focus-within { border-color: var(--accent2); }
    .articles-search input {
      flex: 1; border: none; outline: none; background: transparent;
      font-size: 12px; font-family: inherit; color: var(--t1);
    }
    .articles-count { font-size: 11px; color: var(--t3); margin-left: auto; white-space: nowrap; }

    /* 메인 검색창 */
    .main-search-wrap { display: flex; justify-content: center; margin: 14px 0 8px; }
    .main-search {
      width: 420px; display: flex; align-items: center; gap: 8px;
      border: 1px solid var(--bd); border-radius: 8px;
      padding: 0 12px; height: 36px; background: #fff;
      transition: border-color .18s, box-shadow .18s;
    }
    .main-search:focus-within { border-color: var(--accent2); box-shadow: 0 0 0 2px rgba(37,99,235,.1); }
    .main-search input {
      flex: 1; border: none; outline: none; background: transparent;
      font-size: 13px; font-family: inherit; color: var(--t1);
    }
    .main-search input::placeholder { color: var(--t3); }
    .main-search-icon { font-size: 13px; color: var(--t3); flex-shrink: 0; }

    /* 키워드 chip 바 (메인) */
    .main-kw-bar { display: flex; flex-wrap: wrap; justify-content: center; gap: 4px; margin-bottom: 12px; }
    .kw-chip {
      display: inline-flex; align-items: center;
      padding: 3px 10px; border-radius: 20px;
      border: 1px solid var(--bd); background: #f1f5f9;
      color: var(--t2); font-size: 11px; font-weight: 500;
      cursor: pointer; transition: all .15s; white-space: nowrap;
    }
    .kw-chip:hover { border-color: var(--bd2); background: #e2e8f0; }
    .kw-chip.active          { background: var(--accent-lt); border-color: var(--accent2); color: var(--accent); font-weight: 600; }
    .kw-chip.active.pay-chip { background: var(--pay-lt); border-color: var(--pay-color); color: var(--pay-color); }
    .kw-chip.active.aml-chip { background: var(--aml-lt); border-color: var(--aml-color); color: var(--aml-color); }

    /* 통합 필터 행 */
    .filter-bar {
      display: flex; align-items: center; gap: 6px;
      margin-bottom: 12px; flex-wrap: wrap;
    }
    .filter-divider { width: 1px; height: 18px; background: var(--bd); margin: 0 4px; }
    .filter-count { font-size: 11px; color: var(--t3); margin-left: auto; }

    /* 우선순위 버튼 (필터 바용) */
    .pri-btn {
      padding: 4px 12px; border-radius: 20px; border: 1px solid var(--bd);
      font-size: 11px; font-weight: 700; cursor: pointer; transition: all .15s;
      background: #f1f5f9; color: var(--t2); white-space: nowrap;
    }
    .pri-btn:hover { border-color: var(--bd2); background: #e2e8f0; }
    .pri-btn.active-high { background: #fef2f2; border-color: #fca5a5; color: #b91c1c; }
    .pri-btn.active-mid  { background: #fffbeb; border-color: #fcd34d; color: #92400e; }
    .pri-btn.active-low  { background: #f1f5f9; border-color: #94a3b8; color: #475569; }

    /* ── MAIN ── */
    .main { flex: 1; overflow-y: auto; padding: 20px 24px; }
    .main::-webkit-scrollbar { width: 4px; }
    .main::-webkit-scrollbar-thumb { background: var(--bd); border-radius: 2px; }

    /* 수집 기간 라벨 */
    .period-label {
      font-size: 11px; color: var(--t3); margin-bottom: 10px; font-weight: 500;
    }
    .period-label strong { color: var(--t2); }

    /* 통계 박스 4개 */
    .stat-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px;
    }
    .stat-box {
      background: var(--bg-card); border: 1px solid var(--bd);
      border-radius: 12px; padding: 14px 16px;
      cursor: pointer; transition: all .18s; box-shadow: var(--sh-sm);
    }
    .stat-box:hover { box-shadow: var(--sh); border-color: var(--bd2); transform: translateY(-1px); }
    .stat-box.active-data { border-color: var(--accent2); background: #f0f6ff; box-shadow: 0 0 0 2px rgba(37,99,235,.15), var(--sh); }
    .stat-box.active-pay  { border-color: var(--pay-color); background: #f0fdf8; box-shadow: 0 0 0 2px rgba(15,118,110,.15), var(--sh); }
    .stat-box.active-aml  { border-color: var(--aml-color); background: #fff5f5; box-shadow: 0 0 0 2px rgba(185,28,28,.15), var(--sh); }
    .stat-box.active-all  { border-color: #475569; background: #f8faff; box-shadow: 0 0 0 2px rgba(71,85,105,.12), var(--sh); }
    .stat-label { font-size: 11px; color: var(--t3); font-weight: 600; margin-bottom: 6px; }
    .stat-num   { font-size: 26px; font-weight: 700; color: var(--t1); line-height: 1; }
    .stat-unit  { font-size: 12px; color: var(--t3); margin-left: 3px; font-weight: 500; }

    /* 기사 리스트 */
    .list-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 10px;
    }
    .list-title { font-size: 13px; font-weight: 700; color: var(--t1); }
    .list-count { font-size: 11px; color: var(--t3); }

    .article-list { display: flex; flex-direction: column; gap: 8px; }

    .article-row {
      background: var(--bg-card); border: 1px solid var(--bd);
      border-radius: 10px; padding: 13px 16px;
      display: flex; flex-direction: column; gap: 6px;
      box-shadow: var(--sh-sm); transition: all .18s;
    }
    .article-row:hover { border-color: var(--bd2); box-shadow: var(--sh); }

    .row-top {
      display: flex; align-items: center; gap: 8px;
    }
    .agency-badge {
      font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 4px;
      color: #fff; white-space: nowrap; flex-shrink: 0;
    }
    .badge-data { background: var(--accent-grd); }
    .badge-pay  { background: var(--pay-grd); }
    .badge-aml  { background: var(--aml-grd); }
    .badge-news { background: linear-gradient(135deg,#6d28d9,#7c3aed); }

    /* 보도자료 / 언론기사 필터 버튼 */
    .source-filter { display: flex; gap: 4px; }
    .src-btn {
      padding: 4px 12px; border-radius: 20px; border: 1px solid var(--bd);
      font-size: 11px; font-weight: 600; cursor: pointer; transition: all .15s;
      background: #f1f5f9; color: var(--t2); white-space: nowrap;
    }
    .src-btn:hover { border-color: var(--bd2); background: #e2e8f0; }
    .src-btn.active-press { background: var(--accent-lt); border-color: var(--accent2); color: var(--accent); }
    .src-btn.active-news  { background: #f3e8ff; border-color: #7c3aed; color: #6d28d9; }
    .src-btn.active-all   { background: #f8faff; border-color: #475569; color: #475569; }

    .row-title {
      font-size: 14px; font-weight: 700; color: var(--t1); flex: 1;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .cat-tag {
      font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 10px;
      white-space: nowrap; flex-shrink: 0;
    }
    .tag-data { background: var(--accent-lt); color: var(--accent); border: 1px solid rgba(37,99,235,.25); }
    .tag-pay  { background: var(--pay-lt); color: var(--pay-color); border: 1px solid rgba(15,118,110,.25); }
    .tag-aml  { background: var(--aml-lt); color: var(--aml-color); border: 1px solid rgba(185,28,28,.25); }

    .pri-badge {
      font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 10px;
      white-space: nowrap; flex-shrink: 0;
    }
    .pri-high { background: #ecfdf5; color: #16a34a; border: 1px solid #86efac; }
    .pri-mid  { background: #eff6ff; color: #2563eb; border: 1px solid #93c5fd; }
    .pri-low  { background: #f8fafc; color: #94a3b8; border: 1px solid #cbd5e1; }

    .row-lead {
      font-size: 12px; color: var(--t2); line-height: 1.6;
      display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden;
    }

    .row-bottom {
      display: flex; align-items: center; gap: 8px; margin-top: 2px;
    }
    .row-date { font-size: 12px; color: var(--t3); flex: 1; }

    .row-btn {
      padding: 5px 12px; border-radius: 6px; border: 1px solid var(--bd);
      font-size: 11px; font-weight: 600; cursor: pointer; transition: all .15s;
      background: #f8faff; color: var(--t2); white-space: nowrap;
    }
    .row-btn:hover:not(:disabled) { background: var(--accent2); color: #fff; border-color: var(--accent2); }
    .row-btn:disabled { opacity: .45; cursor: not-allowed; }
    .row-btn.ppt-btn:hover:not(:disabled) { background: var(--pay-color); border-color: var(--pay-color); color: #fff; }
    .link-btn {
      font-size: 11px; color: var(--accent2); text-decoration: none;
      padding: 4px 10px; border-radius: 6px; border: 1px solid var(--accent-lt);
      background: var(--accent-lt); font-weight: 600; transition: all .15s; flex-shrink: 0;
    }
    .link-btn:hover { background: var(--accent2); color: #fff; border-color: var(--accent2); }

    mark { background: rgba(37,99,235,.13); color: var(--accent); border-radius: 2px; padding: 0 1px; }

    .empty-list {
      padding: 48px 0; text-align: center;
      border: 1px dashed var(--bd); border-radius: 12px;
      color: var(--t3); font-size: 13px; background: var(--bg-card);
    }

    /* ── LOG PANEL ── */
    .log-panel {
      width: 280px; flex-shrink: 0;
      background: var(--sidebar-bg);
      border-left: 1px solid var(--bd);
      display: flex; flex-direction: column;
      overflow: hidden;
      transition: width .3s ease, opacity .3s ease;
    }
    /* 로그 패널 숨김 트랜지션 (Alpine x-transition 보조) */
    .log-panel[style*="display: none"] { width: 0; }

    .log-header {
      padding: 12px 14px 10px;
      border-bottom: 1px solid var(--bd);
      display: flex; align-items: center; gap: 7px; flex-shrink: 0;
    }
    .log-title { font-size: 12px; font-weight: 700; color: var(--t2); flex: 1; }
    .log-dot { width: 6px; height: 6px; border-radius: 50%; background: #94a3b8; transition: .3s; }
    .log-dot.live { background: #0ea5e9; animation: blink 1.2s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
    .log-clear {
      font-size: 10px; color: var(--t3); background: none; border: none;
      cursor: pointer; padding: 2px 6px; border-radius: 4px;
    }
    .log-clear:hover { background: #f1f5f9; color: var(--t1); }

    .log-body {
      flex: 1; overflow-y: auto; padding: 8px 12px;
    }
    .log-body::-webkit-scrollbar { width: 3px; }
    .log-body::-webkit-scrollbar-thumb { background: var(--bd); border-radius: 2px; }
    .log-line {
      font-family: 'Menlo','Consolas',monospace;
      font-size: 10.5px; color: var(--t2); line-height: 1.85;
      animation: slideIn .2s ease;
    }
    @keyframes slideIn { from{opacity:0;transform:translateX(-6px)} to{opacity:1;transform:translateX(0)} }
    .log-line.log-section {
      color: var(--accent); font-weight: 700; margin-top: 4px;
      border-top: 1px solid var(--bd); padding-top: 4px;
    }
    .log-line.log-ok { color: #16a34a; }
    .log-line::before { content: '›'; margin-right: 5px; color: var(--t3); }
    .log-line.log-section::before { content: ''; }
    .log-line.log-ok::before     { content: '✓'; color: #16a34a; }

    /* ── MODAL ── */
    .modal-backdrop {
      position: fixed; inset: 0; z-index: 500;
      background: rgba(15,23,42,.45);
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .modal {
      background: #fff; border-radius: 16px;
      width: 100%; max-width: 660px; max-height: 85vh;
      display: flex; flex-direction: column;
      box-shadow: 0 20px 60px rgba(15,23,42,.2);
      overflow: hidden;
    }
    .modal-header {
      padding: 16px 20px 14px;
      border-bottom: 1px solid var(--bd);
      display: flex; align-items: center; gap: 10px;
    }
    .modal-title { font-size: 14px; font-weight: 700; color: var(--t1); flex: 1; }
    .modal-close {
      width: 28px; height: 28px; border-radius: 6px;
      border: 1px solid var(--bd); background: #f8faff;
      color: var(--t3); cursor: pointer; font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      transition: all .15s;
    }
    .modal-close:hover { background: #f1f5f9; color: var(--t1); }
    .modal-body { flex: 1; overflow-y: auto; padding: 16px 20px; }
    textarea {
      width: 100%; min-height: 220px; resize: vertical;
      background: #f8faff; color: var(--t1);
      border: 1px solid var(--bd); border-radius: 8px;
      padding: 12px 14px; font-family: 'Pretendard', monospace;
      font-size: 12px; line-height: 1.9;
    }
    textarea:focus { outline: none; border-color: var(--accent2); box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
    .modal-footer {
      padding: 12px 20px;
      border-top: 1px solid var(--bd);
      display: flex; align-items: center; gap: 8px;
    }
    .modal-footer-spacer { flex: 1; }
    .btn-ppt {
      padding: 8px 20px; border-radius: 8px; border: none;
      background: var(--pay-grd); color: #fff;
      font-size: 12px; font-weight: 700; cursor: pointer; transition: all .18s;
    }
    .btn-ppt:hover:not(:disabled) { filter: brightness(1.1); }
    .btn-ppt:disabled { opacity: .4; cursor: not-allowed; }
    .btn-cancel {
      padding: 8px 18px; border-radius: 8px;
      border: 1px solid var(--bd); background: #f8faff;
      color: var(--t2); font-size: 12px; font-weight: 600; cursor: pointer; transition: all .15s;
    }
    .btn-cancel:hover { background: #f1f5f9; }

    .result-ok  { padding: 10px 14px; border-radius: 8px; font-size: 12px; background: #ecfdf5; border: 1px solid #6ee7b7; color: #065f46; margin-top: 12px; }
    .result-err { padding: 10px 14px; border-radius: 8px; font-size: 12px; background: #fef2f2; border: 1px solid #fca5a5; color: #991b1b; margin-top: 12px; }
    .result-path { font-size: 10px; color: var(--t3); margin-top: 4px; word-break: break-all; }

    /* ── 칸반 (전체 탭) ── */
    .kanban-wrap {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; align-items: stretch;
    }
    .kanban-col {
      background: #f8faff; border: 1px solid var(--bd);
      border-radius: 12px; padding: 0; overflow: hidden;
    }
    .kanban-col-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px; font-size: 12px; font-weight: 700;
      border-bottom: 1px solid var(--bd); background: var(--bg-card);
    }
    .kanban-col-title { letter-spacing: -.2px; }
    .kc-데이터   { color: var(--accent); }
    .kc-페이먼트 { color: var(--pay-color); }
    .kc-AML      { color: var(--aml-color); }
    .kanban-col-count { font-size: 10px; font-weight: 600; color: var(--t3); }
    .empty-col {
      padding: 24px 14px; font-size: 12px; color: var(--t3); text-align: center;
    }

    /* ── 카드 (공통) ── */
    .art-card {
      background: var(--bg-card); border-bottom: 1px solid var(--bd);
      padding: 12px 14px; display: flex; flex-direction: column; gap: 6px;
      transition: background .15s; cursor: default;
    }
    .art-card:last-child { border-bottom: none; }
    .art-card:hover { background: #f0f6ff; }
    .art-card-top { display: flex; align-items: center; gap: 6px; }
    .art-card-title {
      font-size: 14px; font-weight: 700; color: var(--t1); line-height: 1.45;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .art-card-lead {
      font-size: 12px; color: var(--t2); line-height: 1.55;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .art-card-foot {
      display: flex; align-items: center; gap: 6px; margin-top: 2px; flex-wrap: wrap;
    }
    .art-card-date { font-size: 12px; color: var(--t3); flex: 1; }
    .art-card-btns { display: flex; gap: 5px; }

    /* ── 카드 그리드 (개별 탭) ── */
    .card-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
    }
    .card-grid .art-card {
      border: 1px solid var(--bd); border-radius: 10px;
      box-shadow: var(--sh-sm); height: 100%;
    }
    .card-grid .art-card:last-child { border-bottom: 1px solid var(--bd); }
    .card-grid .art-card:hover { box-shadow: var(--sh); border-color: var(--bd2); background: var(--bg-card); }

    /* ── HISTORY ── */
    .history-wrap { padding: 4px 0; }

    /* 통계 카드 */
    .hist-stats { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
    .hist-stat-card {
      flex: 1; min-width: 100px; padding: 14px 18px; border-radius: 10px;
      border: 1.5px solid var(--bd); background: #fff; cursor: pointer;
      transition: all .15s; text-align: center;
    }
    .hist-stat-card:hover { border-color: var(--bd2); background: #f8faff; }
    .hist-stat-card.active { border-color: var(--accent); background: var(--accent-lt); }
    .hist-stat-card.active .hist-stat-label { color: var(--accent); font-weight: 700; }
    .hist-stat-card.active .hist-stat-num { color: var(--accent); }
    .hist-stat-num { font-size: 22px; font-weight: 800; color: var(--t1); line-height: 1.2; }
    .hist-stat-label { font-size: 11px; color: var(--t3); margin-top: 4px; font-weight: 600; }

    /* 검색 */
    .hist-search-wrap { margin-bottom: 14px; }
    .hist-search {
      display: flex; align-items: center; gap: 8px;
      border: 1px solid var(--bd); border-radius: 8px;
      padding: 0 14px; height: 38px; background: #fff; width: 100%;
      box-sizing: border-box;
    }
    .hist-search:focus-within { border-color: var(--accent2); }
    .hist-search input { flex: 1; border: none; outline: none; font-size: 13px; background: transparent; }

    /* 테이블 */
    .history-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .history-table th {
      background: #f1f5f9; padding: 10px 14px; text-align: left;
      border-bottom: 2px solid var(--bd); font-weight: 700; color: var(--t2); white-space: nowrap;
    }
    .history-table td {
      padding: 10px 14px; border-bottom: 1px solid var(--bd);
      color: var(--t2); vertical-align: top;
    }
    .history-table tr:hover td { background: #f8faff; }
    .history-summary {
      max-width: 400px; white-space: pre-wrap; font-size: 11px;
      color: var(--t3); line-height: 1.6; max-height: 80px; overflow: hidden;
    }
    .ppt-dl-btn {
      display: inline-block; padding: 5px 12px; border-radius: 6px;
      background: var(--accent); color: #fff; font-size: 11px; font-weight: 600;
      text-decoration: none; transition: opacity .15s;
    }
    .ppt-dl-btn:hover { opacity: .8; }
    .history-empty {
      text-align: center; padding: 48px; color: var(--t3); font-size: 13px;
    }
    .hist-result-count { font-size: 11px; color: var(--t3); margin-bottom: 8px; text-align: right; }

    [x-cloak] { display: none !important; }

    /* ── 법규/정책 탭 ── */
    .policy-wrap { padding: 4px 0; }
    .policy-controls {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 16px; flex-wrap: wrap;
    }
    .policy-chips { display: flex; gap: 4px; flex-wrap: wrap; }
    .policy-year-select { display: flex; align-items: center; gap: 6px; margin-left: auto; }
    .policy-year-label { font-size: 13px; font-weight: 700; color: var(--t1); min-width: 48px; text-align: center; }
    .gantt-card {
      background: var(--bg-card); border: 1px solid var(--bd);
      border-radius: 12px; overflow: hidden;
      box-shadow: var(--sh-sm); margin-bottom: 20px;
    }
    .gantt-header, .gantt-row {
      display: grid;
      grid-template-columns: 72px repeat(12, 1fr);
    }
    .gantt-header { background: #f1f5f9; }
    .gantt-row { border-top: 1px solid var(--bd); }
    .gantt-row:hover { background: #f8faff; }
    .gantt-row-label {
      padding: 10px 8px; display: flex; align-items: center;
      border-right: 1px solid var(--bd);
    }
    .gantt-label-text { font-size: 11px; font-weight: 700; white-space: nowrap; }
    .gantt-month-cell {
      padding: 8px 2px; font-size: 10px; font-weight: 700;
      color: var(--t3); text-align: center;
      border-right: 1px solid var(--bd);
    }
    .gantt-month-cell:last-child { border-right: none; }
    .gantt-cell {
      padding: 4px 2px; min-height: 40px;
      display: flex; flex-direction: column; gap: 2px; align-items: stretch;
      border-right: 1px solid var(--bd); max-height: 120px; overflow-y: auto;
    }
    .gantt-cell:last-child { border-right: none; }
    .gantt-pill {
      padding: 2px 4px; border-radius: 3px;
      font-size: 9px; font-weight: 700; color: #fff;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      cursor: pointer; transition: filter .15s, transform .15s;
      text-align: center;
    }
    .gantt-pill:hover { filter: brightness(1.2); transform: scale(1.05); z-index: 10; position: relative; }
    .policy-list-header {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px;
    }
    .policy-list-header .list-title { font-size: 13px; font-weight: 700; color: var(--t1); }
    .policy-list-header .list-count { font-size: 11px; color: var(--t3); }
    .policy-article-row { cursor: pointer; }
    .policy-notice { font-size: 11px; color: var(--t3); margin-left: 8px; }

    /* 간트 연도 네비게이션 */
    .gantt-year-nav { display: flex; align-items: center; gap: 6px; margin-left: 4px; }
    .gantt-year-btn {
      width: 22px; height: 22px; border-radius: 5px;
      border: 1px solid var(--bd); background: #f8faff;
      color: var(--t2); font-size: 13px; font-weight: 700;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all .15s; padding: 0;
    }
    .gantt-year-btn:hover { background: var(--accent-lt); color: var(--accent); border-color: var(--accent2); }
    .gantt-year-label { font-size: 13px; font-weight: 700; color: var(--t1); min-width: 42px; text-align: center; }

    /* 범례 */
    .gantt-legend {
      display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px;
    }
    .gantt-legend-item {
      font-size: 10px; font-weight: 700; color: #fff;
      padding: 2px 10px; border-radius: 20px;
    }

    /* ── 법규/정책 관리 시스템 ── */
    /* 서브탭 */
    .policy-subtabs {
      display: flex; gap: 6px; margin-bottom: 18px;
      border-bottom: 2px solid var(--bd); padding-bottom: 0;
    }
    .policy-subtab {
      padding: 8px 18px; border-radius: 6px 6px 0 0; border: 1px solid transparent;
      background: none; font-size: 13px; font-weight: 600; color: var(--t3);
      cursor: pointer; transition: all .15s; margin-bottom: -2px;
    }
    .policy-subtab:hover { color: var(--t2); background: #f1f5f9; }
    .policy-subtab.active {
      color: var(--accent); background: #fff;
      border-color: var(--bd); border-bottom-color: #fff;
    }

    /* 통계 카드 */
    .policy-stat-grid {
      display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 20px;
    }
    @media(max-width:900px) { .policy-stat-grid { grid-template-columns: repeat(3, 1fr); } }
    .policy-stat-card {
      background: #fff; border: 1.5px solid var(--bd); border-radius: 10px;
      padding: 14px 16px; text-align: center;
      transition: box-shadow .15s;
    }
    .policy-stat-card.impact-high   { border-color: #fca5a5; background: #fff5f5; }
    .policy-stat-card.status-active { border-color: #86efac; background: #f0fdf4; }
    .policy-stat-card.status-pending{ border-color: #c4b5fd; background: #faf5ff; }
    .policy-stat-card.status-tracking{ border-color: #93c5fd; background: #eff6ff; }
    .policy-stat-label { font-size: 11px; color: var(--t3); font-weight: 600; margin-bottom: 6px; }
    .policy-stat-num   { font-size: 28px; font-weight: 800; color: var(--t1); line-height: 1; }

    /* 섹션 제목 */
    .policy-section-title {
      font-size: 13px; font-weight: 700; color: var(--t1);
      margin-bottom: 10px; padding-left: 2px;
    }
    .policy-empty {
      padding: 24px; text-align: center; font-size: 12px; color: var(--t3);
      border: 1px dashed var(--bd); border-radius: 8px;
      background: #fafbff; margin-bottom: 12px;
    }

    /* D-day 알림 카드 */
    .policy-alert-card {
      display: flex; align-items: flex-start; gap: 14px;
      padding: 12px 14px; border-radius: 8px; border: 1.5px solid;
      margin-bottom: 8px; background: #fff;
    }
    .policy-dday {
      font-size: 15px; font-weight: 800; min-width: 52px;
      text-align: center; flex-shrink: 0; padding-top: 2px;
    }
    .policy-alert-body { flex: 1; min-width: 0; }
    .policy-alert-name { font-size: 13px; font-weight: 700; color: var(--t1); margin-bottom: 2px; }
    .policy-alert-meta { font-size: 11px; color: var(--t3); margin-bottom: 2px; }
    .policy-alert-action { font-size: 11px; color: var(--t2); }

    /* DB 필터 바 */
    .policy-db-bar {
      display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .policy-select {
      padding: 5px 10px; border-radius: 6px; border: 1px solid var(--bd);
      font-size: 12px; color: var(--t2); background: #fff; cursor: pointer;
      font-family: inherit;
    }
    .policy-select:focus { outline: none; border-color: var(--accent2); }
    .policy-search-input {
      padding: 5px 12px; border-radius: 6px; border: 1px solid var(--bd);
      font-size: 12px; color: var(--t1); background: #fff; flex: 1; min-width: 120px;
      font-family: inherit;
    }
    .policy-search-input:focus { outline: none; border-color: var(--accent2); }

    /* 정책 아이템 카드 */
    .policy-item-card {
      background: #fff; border: 1px solid var(--bd); border-radius: 10px;
      padding: 14px 16px; margin-bottom: 10px; box-shadow: var(--sh-sm);
      transition: box-shadow .15s;
    }
    .policy-item-card:hover { box-shadow: var(--sh); border-color: var(--bd2); }
    .policy-item-top {
      display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 6px;
    }
    .policy-item-name {
      font-size: 14px; font-weight: 700; color: var(--t1); flex: 1; min-width: 0;
    }
    .policy-dday-sm {
      font-size: 11px; font-weight: 800; padding: 2px 8px; border-radius: 20px;
      flex-shrink: 0;
    }
    .policy-item-meta {
      font-size: 11px; color: var(--t3); margin-bottom: 6px;
    }
    .policy-item-content {
      font-size: 12px; color: var(--t2); line-height: 1.6; margin-bottom: 6px;
    }
    .policy-item-action {
      font-size: 11px; color: var(--t2); background: #f8faff;
      border: 1px solid var(--bd); border-radius: 6px;
      padding: 6px 10px; margin-bottom: 8px; line-height: 1.5;
      display: flex; gap: 8px;
    }
    .policy-item-foot {
      display: flex; align-items: center; gap: 8px; margin-top: 6px;
    }
    .policy-toggle-wrap {
      display: flex; align-items: center; gap: 5px;
      font-size: 11px; color: var(--t2); cursor: pointer; flex: 1;
    }
    .policy-toggle-wrap input { cursor: pointer; }

    /* 배지 */
    .policy-badge {
      font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 10px;
      white-space: nowrap; flex-shrink: 0; border: 1px solid transparent;
    }
    .policy-badge-type { background: var(--accent-lt); color: var(--accent); border-color: rgba(37,99,235,.2); }
    .policy-badge-area { background: #f1f5f9; color: var(--t2); border-color: var(--bd); }

    /* 캘린더 */
    .policy-cal-group-title {
      font-size: 12px; font-weight: 700; margin: 14px 0 6px;
      padding: 6px 12px; border-radius: 6px; border-left: 4px solid;
      background: #fafbff;
    }
    .policy-cal-item {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 10px 12px; border-radius: 8px; border: 1px solid var(--bd);
      background: #fff; margin-bottom: 6px;
    }
    .policy-cal-dday { font-size: 13px; font-weight: 800; min-width: 48px; text-align: center; flex-shrink: 0; }
    .policy-cal-label {
      font-size: 10px; font-weight: 700; color: var(--t3); min-width: 36px;
      text-align: center; flex-shrink: 0; padding-top: 2px;
    }
    .policy-cal-body { flex: 1; min-width: 0; }
    .policy-cal-name { font-size: 13px; font-weight: 700; color: var(--t1); margin-bottom: 2px; }
    .policy-cal-meta { font-size: 11px; color: var(--t3); margin-bottom: 2px; }
    .policy-cal-action { font-size: 11px; color: var(--t2); }

    /* ── 대응 캘린더 (2분할 레이아웃) ── */
    .cal-layout {
      display: flex; gap: 18px; align-items: flex-start; min-height: 480px;
    }
    /* 왼쪽: 달력 */
    .cal-left {
      width: 300px; flex-shrink: 0;
      background: #fff; border: 1px solid var(--bd); border-radius: 12px;
      overflow: hidden; box-shadow: var(--sh-sm);
    }
    .cal-nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 14px; border-bottom: 1px solid var(--bd);
      background: #fff;
    }
    .cal-nav-btn {
      width: 28px; height: 28px; border-radius: 6px;
      border: 1px solid var(--bd); background: #f8faff;
      color: var(--t2); font-size: 15px; font-weight: 700;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all .15s; padding: 0;
    }
    .cal-nav-btn:hover { background: var(--accent-lt); color: var(--accent); border-color: var(--accent2); }
    .cal-nav-title { font-size: 14px; font-weight: 700; color: var(--t1); }

    .cal-grid {
      display: grid; grid-template-columns: repeat(7, 1fr);
      padding: 8px 6px 6px;
    }
    .cal-weekday {
      text-align: center; font-size: 10px; font-weight: 700;
      color: var(--t3); padding: 4px 0 8px;
    }
    .cal-weekday:first-child { color: #ef4444; }
    .cal-weekday:last-child  { color: #3b82f6; }

    .cal-day {
      display: flex; flex-direction: column; align-items: center;
      padding: 4px 2px; border-radius: 8px; cursor: pointer;
      transition: background .12s; min-height: 40px; position: relative;
    }
    .cal-day:hover:not(.cal-day-empty) { background: #f1f5f9; }
    .cal-day.cal-day-empty { cursor: default; }
    .cal-day-num {
      font-size: 12px; font-weight: 500; color: var(--t2); line-height: 1.6;
    }
    .cal-day:nth-child(7n+1) .cal-day-num { color: #ef4444; }
    .cal-day:nth-child(7n)   .cal-day-num { color: #3b82f6; }
    .cal-day.cal-day-today .cal-day-num {
      background: var(--accent2); color: #fff;
      width: 24px; height: 24px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .cal-day.cal-day-selected:not(.cal-day-today) .cal-day-num {
      background: var(--accent-lt); color: var(--accent);
      width: 24px; height: 24px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center; font-weight: 700;
    }
    .cal-dots {
      display: flex; gap: 2px; flex-wrap: wrap; justify-content: center;
      max-width: 28px; margin-top: 2px;
    }
    .cal-dot {
      width: 5px; height: 5px; border-radius: 50%; background: var(--accent2); flex-shrink: 0;
    }
    .cal-dot.dot-pay { background: var(--pay-color); }
    .cal-dot.dot-aml { background: var(--aml-color); }
    .cal-dot.dot-policy { background: #7c3aed; }

    .cal-today-btn {
      display: block; width: 100%; padding: 11px;
      background: #f8faff; border: none; border-top: 1px solid var(--bd);
      font-size: 12px; font-weight: 600; color: var(--t2);
      cursor: pointer; transition: all .15s; text-align: center;
    }
    .cal-today-btn:hover { background: var(--accent-lt); color: var(--accent); }

    /* 오른쪽: 필터 + 목록 */
    .cal-right {
      flex: 1; min-width: 0;
      display: flex; flex-direction: column; gap: 12px;
    }
    .cal-filter-bar {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
      background: #fff; border: 1px solid var(--bd); border-radius: 10px;
      padding: 10px 14px;
    }
    .cal-cat-chips { display: flex; gap: 5px; flex-wrap: wrap; }
    .cal-date-header {
      font-size: 13px; font-weight: 700; color: var(--t1);
      padding: 2px 0;
    }
    .cal-date-count { font-size: 11px; color: var(--t3); margin-left: 6px; }
    .cal-items-wrap {
      display: flex; flex-direction: column; gap: 8px;
    }
    .cal-item-card {
      background: #fff; border: 1px solid var(--bd); border-radius: 10px;
      padding: 12px 14px; box-shadow: var(--sh-sm);
      transition: box-shadow .15s, border-color .15s;
    }
    .cal-item-card:hover { box-shadow: var(--sh); border-color: var(--bd2); }
    .cal-item-top {
      display: flex; align-items: center; gap: 7px; margin-bottom: 6px; flex-wrap: wrap;
    }
    .cal-type-badge {
      font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 4px;
      color: #fff; flex-shrink: 0;
    }
    .cal-type-시행  { background: #16a34a; }
    .cal-type-공포  { background: #7c3aed; }
    .cal-type-보도  { background: var(--accent2); }
    .cal-org-badge {
      font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 4px;
      background: #f1f5f9; color: var(--t2); flex-shrink: 0;
    }
    .cal-item-title {
      font-size: 13px; font-weight: 700; color: var(--t1);
      line-height: 1.45; margin-bottom: 5px;
    }
    .cal-item-summary {
      font-size: 11px; color: var(--t2); line-height: 1.6;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
      margin-bottom: 6px;
    }
    .cal-item-foot {
      display: flex; align-items: center; gap: 8px;
    }
    .cal-status-badge {
      font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 10px;
    }
    .cal-empty {
      padding: 48px; text-align: center; font-size: 13px; color: var(--t3);
      background: #fafbff; border: 1px dashed var(--bd); border-radius: 10px;
    }

    /* 폼 */
    .policy-form-label {
      display: block; font-size: 11px; font-weight: 600; color: var(--t2);
      margin-bottom: 4px;
    }
    .policy-form-input {
      width: 100%; padding: 7px 10px; border-radius: 6px; border: 1px solid var(--bd);
      font-size: 12px; font-family: inherit; color: var(--t1); background: #fff;
      box-sizing: border-box;
    }
    .policy-form-input:focus { outline: none; border-color: var(--accent2); box-shadow: 0 0 0 2px rgba(37,99,235,.1); }
    textarea.policy-form-input { resize: vertical; min-height: 60px; }

    /* ── HOME 리디자인 ── */
    .home-top-bar {
      display: flex; align-items: center; gap: 14px; margin-bottom: 12px;
    }
    .home-search {
      flex: 1; max-width: 400px;
      display: flex; align-items: center; gap: 8px;
      border: 1px solid var(--bd); border-radius: 8px;
      padding: 0 12px; height: 36px; background: #fff;
      transition: border-color .18s, box-shadow .18s;
    }
    .home-search:focus-within { border-color: var(--accent2); box-shadow: 0 0 0 2px rgba(37,99,235,.1); }
    .home-search input { flex:1; border:none; outline:none; background:transparent; font-size:13px; font-family:inherit; color:var(--t1); }
    .home-search input::placeholder { color: var(--t3); }

    .home-chip-bar {
      display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 16px;
    }
    .home-chip {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 5px 12px; border-radius: 20px;
      border: 1.5px solid var(--bd); background: #f8faff;
      color: var(--t2); font-size: 12px; font-weight: 600;
      cursor: pointer; transition: all .15s; white-space: nowrap;
    }
    .home-chip:hover { border-color: var(--bd2); background: #f1f5f9; }
    .chip-count {
      font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 10px;
      background: rgba(0,0,0,.08);
    }
    .home-chip.chip-all.active   { background: #f1f5f9; border-color: #64748b; color: #1e293b; }
    .home-chip.chip-data.active  { background: var(--accent-lt); border-color: var(--accent2); color: var(--accent); }
    .home-chip.chip-pay.active   { background: var(--pay-lt); border-color: var(--pay-color); color: var(--pay-color); }
    .home-chip.chip-aml.active   { background: var(--aml-lt); border-color: var(--aml-color); color: var(--aml-color); }
    .home-chip.chip-press.active { background: var(--accent-lt); border-color: var(--accent2); color: var(--accent); }
    .home-chip.chip-news.active  { background: #f3e8ff; border-color: #7c3aed; color: #6d28d9; }
    .home-chip.chip-pri-high.active { background: #ecfdf5; border-color: #86efac; color: #16a34a; }
    .home-chip.chip-pri-mid.active  { background: #eff6ff; border-color: #93c5fd; color: #2563eb; }
    .home-chip.chip-pri-low.active  { background: #f8fafc; border-color: #cbd5e1; color: #94a3b8; }

    /* 통계 스트립 (가로 1줄) */
    .home-stats-strip {
      display: flex; gap: 8px; margin-bottom: 14px; align-items: stretch;
    }
    .home-strip-card {
      flex: 1; background: #fff; border: 1px solid var(--bd);
      border-radius: 10px; padding: 10px 14px;
      display: flex; align-items: center; gap: 10px;
      cursor: pointer; transition: box-shadow .15s, border-color .15s;
      min-width: 0;
    }
    .home-strip-card:hover { border-color: var(--bd2); box-shadow: var(--sh); }
    .home-strip-card.strip-active-data  { border-color: var(--accent2); background: #f0f6ff; }
    .home-strip-card.strip-active-pay   { border-color: var(--pay-color); background: #f0fdf8; }
    .home-strip-card.strip-active-aml   { border-color: var(--aml-color); background: #fff5f5; }
    .home-strip-label { font-size: 11px; font-weight: 700; flex-shrink: 0; }
    .home-strip-bar-wrap { flex: 1; height: 5px; background: #f1f5f9; border-radius: 3px; overflow: hidden; min-width: 30px; }
    .home-strip-bar { height: 100%; border-radius: 3px; transition: width .6s ease; min-width: 3px; }
    .home-strip-num { font-size: 12px; font-weight: 700; color: var(--t2); flex-shrink: 0; white-space: nowrap; }
    .home-strip-divider { width: 1px; background: var(--bd); flex-shrink: 0; margin: 0 4px; }
    .home-strip-info {
      flex: 1; background: #fff; border: 1px solid var(--bd);
      border-radius: 10px; padding: 10px 14px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-width: 0;
    }
    .home-strip-info-label { font-size: 10px; color: var(--t3); font-weight: 600; margin-bottom: 3px; white-space: nowrap; }
    .home-strip-info-num { font-size: 15px; font-weight: 800; color: var(--t1); }

    .home-main-layout {
      display: flex; flex-direction: column; gap: 12px; margin-bottom: 16px;
    }
    .home-feed { display: flex; flex-direction: column; gap: 12px; }

    .home-featured-card {
      background: #fff; border: 1px solid var(--bd);
      border-left: 4px solid var(--accent2);
      border-radius: 12px; padding: 16px 18px;
      box-shadow: var(--sh-sm); display: flex; flex-direction: column; gap: 8px;
      transition: box-shadow .15s;
    }
    .home-featured-card:hover { box-shadow: var(--sh-md); }
    .home-featured-title {
      font-size: 15px; font-weight: 700; color: var(--t1); line-height: 1.45;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .home-featured-lead {
      font-size: 12px; color: var(--t2); line-height: 1.65;
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
    }

    .home-stats-card {
      background: #fff; border: 1px solid var(--bd);
      border-radius: 12px; padding: 14px 16px; box-shadow: var(--sh-sm);
    }
    .home-card-header {
      font-size: 12px; font-weight: 700; color: var(--t2);
      margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--bd);
    }
    .home-stat-rows { display: flex; flex-direction: column; gap: 10px; }
    .home-stat-row {
      display: flex; align-items: center; gap: 8px;
      cursor: pointer; padding: 3px 4px; border-radius: 6px; transition: background .12s;
    }
    .home-stat-row:hover { background: #f1f5f9; }
    .home-stat-label { font-size: 11px; font-weight: 700; width: 50px; flex-shrink: 0; }
    .home-stat-data { color: var(--accent); }
    .home-stat-pay  { color: var(--pay-color); }
    .home-stat-aml  { color: var(--aml-color); }
    .home-stat-bar-wrap { flex: 1; height: 6px; background: #f1f5f9; border-radius: 3px; overflow: hidden; }
    .home-stat-bar { height: 100%; border-radius: 3px; transition: width .6s ease; min-width: 3px; }
    .home-bar-data { background: var(--accent2); }
    .home-bar-pay  { background: var(--pay-color); }
    .home-bar-aml  { background: var(--aml-color); }
    .home-stat-num { font-size: 12px; font-weight: 700; color: var(--t2); width: 24px; text-align: right; flex-shrink: 0; }
    .home-stats-total {
      margin-top: 10px; padding-top: 8px; border-top: 1px solid var(--bd);
      font-size: 11px; color: var(--t3); text-align: right;
    }
    .home-stats-total strong { color: var(--t1); font-size: 13px; }
    .home-update-info { display: flex; flex-direction: column; gap: 8px; }
    .home-update-row { display: flex; align-items: center; justify-content: space-between; }
    .home-update-label { font-size: 11px; color: var(--t3); font-weight: 500; }
    .home-update-val { font-size: 12px; color: var(--t1); font-weight: 700; }

    .home-cat-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px;
    }
    .home-cat-col {
      background: #fff; border: 1px solid var(--bd);
      border-radius: 12px; overflow: hidden; box-shadow: var(--sh-sm);
    }
    .home-cat-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px; border-bottom: 1px solid var(--bd); background: #f8faff;
    }
    .home-cat-title { font-size: 12px; font-weight: 700; }
    .home-mini-card {
      padding: 10px 14px; border-bottom: 1px solid var(--bd);
      display: flex; flex-direction: column; gap: 5px; transition: background .12s;
    }
    .home-mini-card:last-of-type { border-bottom: none; }
    .home-mini-card:hover { background: #f8faff; }
    .home-mini-top { display: flex; align-items: center; gap: 6px; }
    .home-mini-title {
      font-size: 13px; font-weight: 600; color: var(--t1); line-height: 1.45;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .home-mini-foot { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .home-more-btn {
      width: 100%; padding: 9px; text-align: center;
      background: #f8faff; border: none; border-top: 1px solid var(--bd);
      font-size: 11px; font-weight: 600; color: var(--t3); cursor: pointer; transition: all .15s;
    }
    .home-more-btn:hover { background: var(--accent-lt); color: var(--accent); }

    /* ── HOME 달력 + 오늘 보도자료 2분할 ── */
    .home-cal-layout {
      display: flex; gap: 18px; align-items: flex-start; margin-bottom: 16px;
    }
    .home-daily-right {
      flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 10px;
    }
    .home-daily-header {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 14px; background: #fff;
      border: 1px solid var(--bd); border-radius: 10px;
    }
    .home-daily-date { font-size: 13px; font-weight: 700; color: var(--t1); flex: 1; }
    .home-daily-group { display: flex; flex-direction: column; gap: 6px; }
    .home-daily-cat-label {
      font-size: 11px; font-weight: 700; padding: 3px 0 5px;
      border-bottom: 1px solid var(--bd); margin-bottom: 2px;
    }
    .cal-type-보도자료 { background: var(--accent2); }
    .cal-type-언론기사 { background: #6d28d9; }

    /* 3×3 그리드 */
    .home-daily-3col {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
    }
    .home-daily-col { display: flex; flex-direction: column; gap: 6px; }
    .home-daily-col-hdr {
      font-size: 11px; font-weight: 700; text-align: center;
      padding: 6px 8px; border-radius: 7px;
      background: #f1f5f9; border: 1px solid var(--bd);
    }
    .home-daily-mini-card {
      background: #fff; border: 1px solid var(--bd); border-radius: 8px;
      padding: 9px 11px; display: flex; flex-direction: column; gap: 4px;
      transition: box-shadow .12s, border-color .12s;
    }
    .home-daily-mini-card:hover { box-shadow: var(--sh); border-color: var(--bd2); }
    .home-daily-mini-top { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
    .home-daily-mini-title {
      font-size: 12px; font-weight: 600; color: var(--t1); line-height: 1.4;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .home-daily-mini-foot { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; margin-top: 2px; }
    .home-daily-empty-col {
      background: #fafbff; border: 1px dashed var(--bd); border-radius: 8px;
      padding: 20px 8px; text-align: center; font-size: 11px; color: var(--t3);
    }

    /* ── 정책DB 사업영역별 2×2 그리드 ── */
    .policy-db-grid {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px;
    }
    .policy-col {
      background: #fff; border: 1px solid var(--bd);
      border-radius: 12px; overflow: hidden; box-shadow: var(--sh-sm);
      display: flex; flex-direction: column;
    }
    .policy-col-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px; border-bottom: 1px solid var(--bd);
      background: #f8faff; flex-shrink: 0;
    }
    .policy-col-title { font-size: 12px; font-weight: 700; }
    .policy-col-count { font-size: 10px; font-weight: 600; color: var(--t3); }
    .policy-mini-card {
      padding: 11px 14px; border-bottom: 1px solid var(--bd);
      display: flex; flex-direction: column; gap: 5px; transition: background .12s;
    }
    .policy-mini-card:last-child { border-bottom: none; }
    .policy-mini-card:hover { background: #f8faff; }
    .policy-mini-top { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
    .policy-mini-name {
      font-size: 13px; font-weight: 600; color: var(--t1); line-height: 1.4;
    }
    .policy-mini-meta { font-size: 10px; color: var(--t3); line-height: 1.5; }
    .policy-mini-content {
      font-size: 11px; color: var(--t2); line-height: 1.55;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .policy-mini-foot { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; margin-top: 2px; }

    /* 카테고리 선택 시 컬럼 활성/비활성 */
    .home-cat-grid { transition: grid-template-columns .3s ease; }
    .home-cat-col { transition: opacity .25s, box-shadow .25s, border-color .25s; }
    .home-cat-col.col-active      { box-shadow: var(--sh-md); }
    .home-cat-col.col-active-data { border-top: 3px solid var(--accent2); }
    .home-cat-col.col-active-pay  { border-top: 3px solid var(--pay-color); }
    .home-cat-col.col-active-aml  { border-top: 3px solid var(--aml-color); }
    .home-cat-col.col-inactive    { opacity: 0.5; }
    .home-cat-col.col-inactive .home-mini-title { -webkit-line-clamp: 1; }
    .home-cat-col.col-inactive .home-mini-foot  { display: none; }
  </style>
</head>

<body x-data="app()" x-init="init()">

  <!-- ── HEADER ── -->
  <header>
    <div class="hdr-logo">
      <div class="hdr-badge">WR</div>
      <span class="hdr-title">쿠콘 보도자료/언론기사 모니터링</span>
    </div>

    <div class="hdr-spacer"></div>
    <span class="hdr-date" x-text="today"></span>
    <button class="collect-btn primary" :disabled="collecting" @click="startCollect(activeCategory)">
      <span x-text="collecting ? '수집 중...' : '▶ 수집 시작'"></span>
    </button>
    <!-- 로그 패널 토글 -->
    <button class="log-toggle-btn" @click="showLog = !showLog"
      :title="showLog ? '로그 숨기기' : '로그 보기'">
      <span x-text="showLog ? '◀ 로그' : '로그 ▶'"></span>
    </button>
  </header>

  <!-- ── BODY ── -->
  <div id="wrap">

    <!-- ── SIDEBAR ── -->
    <aside class="sidebar">
      <div class="nav-item" :class="(currentPage === 'home' || currentPage === 'articles') ? 'active' : ''"
           @click="currentPage = 'home'">
        <span class="nav-icon">🏠</span>
        <span class="nav-label">HOME</span>
      </div>
      <!-- HOME 서브메뉴 -->
      <template x-if="currentPage === 'home' || currentPage === 'articles'">
        <div class="nav-sub-group">
          <template x-for="cat in ['데이터','페이먼트','AML']" :key="cat">
            <div class="nav-sub-item"
                 :class="[
                   currentPage==='articles' && articlesCategory===cat ? 'active' : '',
                   cat==='페이먼트' ? 'sub-pay' : cat==='AML' ? 'sub-aml' : ''
                 ]"
                 @click="openArticlesPage(cat)">
              <span class="nav-sub-dot"
                    :class="cat==='데이터' ? 'dot-data' : cat==='페이먼트' ? 'dot-pay' : 'dot-aml'"></span>
              <span x-text="cat"></span>
              <span class="nav-sub-count" x-text="(allArticles[cat]||[]).length"></span>
            </div>
          </template>
        </div>
      </template>
      <div class="nav-item" :class="currentPage === 'history' ? 'active' : ''"
           @click="currentPage = 'history'; loadHistory()">
        <span class="nav-icon">📚</span>
        <span class="nav-label">HISTORY</span>
      </div>
      <div class="nav-item" :class="currentPage === 'policy' ? 'active' : ''"
           @click="currentPage = 'policy'; loadPolicy()">
        <span class="nav-icon">⚖️</span>
        <span class="nav-label">법규/정책</span>
      </div>
    </aside>

    <!-- ── MAIN ── -->
    <main class="main">

      <!-- ══ HOME ══ -->
      <template x-if="currentPage === 'home'">
        <div>

          <!-- 상단: 수집 기간 + 검색창 -->
          <div class="home-top-bar">
            <span class="period-label" style="margin:0; flex-shrink:0">
              수집 기간: <strong x-text="periodLabel"></strong>
            </span>
            <div class="home-search">
              <span class="main-search-icon">🔍</span>
              <input type="text" x-model="searchQuery" placeholder="기사 검색..." />
              <template x-if="searchQuery">
                <span @click="searchQuery=''" style="cursor:pointer;color:var(--t3);font-size:12px">✕</span>
              </template>
            </div>
          </div>

          <!-- 필터 칩 바 -->
          <div class="home-chip-bar">
            <button class="home-chip chip-all" :class="activeCategory==='전체' ? 'active' : ''"
                    @click="switchCategory('전체')">
              전체 <span class="chip-count" x-text="totalCount + '건'"></span>
            </button>
            <button class="home-chip chip-data" :class="activeCategory==='데이터' ? 'active' : ''"
                    @click="switchCategory('데이터')">
              데이터 <span class="chip-count" x-text="allArticles['데이터'].length + '건'"></span>
            </button>
            <button class="home-chip chip-pay" :class="activeCategory==='페이먼트' ? 'active' : ''"
                    @click="switchCategory('페이먼트')">
              페이먼트 <span class="chip-count" x-text="allArticles['페이먼트'].length + '건'"></span>
            </button>
            <button class="home-chip chip-aml" :class="activeCategory==='AML' ? 'active' : ''"
                    @click="switchCategory('AML')">
              AML <span class="chip-count" x-text="allArticles['AML'].length + '건'"></span>
            </button>
            <div class="filter-divider"></div>
            <button class="home-chip chip-press" :class="articleType==='보도자료' ? 'active' : ''"
                    @click="articleType = articleType === '보도자료' ? '전체' : '보도자료'">
              📋 보도자료
            </button>
            <button class="home-chip chip-news" :class="articleType==='언론기사' ? 'active' : ''"
                    @click="articleType = articleType === '언론기사' ? '전체' : '언론기사'">
              📰 언론기사
            </button>
            <div class="filter-divider"></div>
            <button class="home-chip chip-pri-high" :class="priorityFilter==='상' ? 'active' : ''"
                    @click="togglePriority('상')">상</button>
            <button class="home-chip chip-pri-mid" :class="priorityFilter==='중' ? 'active' : ''"
                    @click="togglePriority('중')">중</button>
            <button class="home-chip chip-pri-low" :class="priorityFilter==='하' ? 'active' : ''"
                    @click="togglePriority('하')">하</button>
          </div>

          <!-- 통계 스트립 (가로 1줄) -->
          <div class="home-stats-strip">
            <div class="home-strip-card"
                 :class="activeCategory==='데이터' ? 'strip-active-data' : ''"
                 @click="switchCategory('데이터')">
              <span class="home-strip-label home-stat-data">데이터</span>
              <div class="home-strip-bar-wrap">
                <div class="home-strip-bar home-bar-data"
                     :style="`width:${totalCount>0 ? Math.round(allArticles['데이터'].length/totalCount*100) : 0}%`"></div>
              </div>
              <span class="home-strip-num" x-text="allArticles['데이터'].length + '건'"></span>
            </div>
            <div class="home-strip-card"
                 :class="activeCategory==='페이먼트' ? 'strip-active-pay' : ''"
                 @click="switchCategory('페이먼트')">
              <span class="home-strip-label home-stat-pay">페이먼트</span>
              <div class="home-strip-bar-wrap">
                <div class="home-strip-bar home-bar-pay"
                     :style="`width:${totalCount>0 ? Math.round(allArticles['페이먼트'].length/totalCount*100) : 0}%`"></div>
              </div>
              <span class="home-strip-num" x-text="allArticles['페이먼트'].length + '건'"></span>
            </div>
            <div class="home-strip-card"
                 :class="activeCategory==='AML' ? 'strip-active-aml' : ''"
                 @click="switchCategory('AML')">
              <span class="home-strip-label home-stat-aml">AML</span>
              <div class="home-strip-bar-wrap">
                <div class="home-strip-bar home-bar-aml"
                     :style="`width:${totalCount>0 ? Math.round(allArticles['AML'].length/totalCount*100) : 0}%`"></div>
              </div>
              <span class="home-strip-num" x-text="allArticles['AML'].length + '건'"></span>
            </div>
            <div class="home-strip-divider"></div>
            <div class="home-strip-info">
              <div class="home-strip-info-label">우선:상</div>
              <div class="home-strip-info-num" x-text="highPriorityCount + '건'"></div>
            </div>
            <div class="home-strip-info">
              <div class="home-strip-info-label">보도자료</div>
              <div class="home-strip-info-num" x-text="pressCount + '건'"></div>
            </div>
            <div class="home-strip-info">
              <div class="home-strip-info-label">언론기사</div>
              <div class="home-strip-info-num" x-text="newsCount + '건'"></div>
            </div>
          </div>

          <!-- 달력 + 오늘 우선:상 보도자료 2분할 -->
          <div class="home-cal-layout">

            <!-- 왼쪽: 월간 달력 -->
            <div class="cal-left">
              <div class="cal-nav">
                <button class="cal-nav-btn" @click="calPrevMonth()">‹</button>
                <span class="cal-nav-title" x-text="`${calYear}년 ${calMonth}월`"></span>
                <button class="cal-nav-btn" @click="calNextMonth()">›</button>
              </div>
              <div class="cal-grid">
                <template x-for="d in ['일','월','화','수','목','금','토']" :key="d">
                  <div class="cal-weekday" x-text="d"></div>
                </template>
                <template x-for="(cell, idx) in calDays" :key="idx">
                  <div class="cal-day"
                       :class="{
                         'cal-day-empty':    cell === null,
                         'cal-day-today':    cell !== null && cell.dateStr === _calTodayStr(),
                         'cal-day-selected': cell !== null && cell.dateStr === calSelectedDate && cell.dateStr !== _calTodayStr()
                       }"
                       @click="cell !== null && (calSelectedDate = cell.dateStr)">
                    <span class="cal-day-num" x-text="cell ? cell.d : ''"></span>
                    <div class="cal-dots" x-show="cell !== null && homeCalDotDates.has(cell.dateStr)">
                      <span class="cal-dot"></span>
                    </div>
                  </div>
                </template>
              </div>
              <button class="cal-today-btn" @click="calGoToday()">오늘 뉴스 보기</button>
            </div>

            <!-- 오른쪽: 선택일 우선:상 기사 — 3열 그리드 -->
            <div class="home-daily-right">
              <div class="home-daily-header">
                <span class="home-daily-date" x-text="calSelectedDate + ' — 우선순위 상 보도자료'"></span>
              </div>
              <div class="home-daily-3col">
                <template x-for="cat in ['데이터','페이먼트','AML']" :key="cat">
                  <div class="home-daily-col">
                    <!-- 열 헤더 -->
                    <div class="home-daily-col-hdr"
                         :style="cat==='데이터' ? 'color:var(--accent);border-color:var(--accent);background:var(--accent-lt)'
                               : cat==='페이먼트' ? 'color:var(--pay-color);border-color:var(--pay-color);background:var(--pay-lt)'
                               : 'color:var(--aml-color);border-color:var(--aml-color);background:var(--aml-lt)'"
                         x-text="cat"></div>
                    <!-- 기사 카드 -->
                    <template x-for="a in homeDailyColItems(cat)" :key="a._uid">
                      <div class="home-daily-mini-card">
                        <div class="home-daily-mini-top">
                          <span class="cal-type-badge"
                                :class="sourceType(a)==='언론기사' ? 'cal-type-언론기사' : 'cal-type-보도자료'"
                                x-text="sourceType(a)"></span>
                          <span class="cal-org-badge" x-text="a['기관']"></span>
                        </div>
                        <div class="home-daily-mini-title" x-html="highlight(a['제목'])"></div>
                        <div class="home-daily-mini-foot">
                          <a x-show="a['링크']" :href="a['링크']" target="_blank"
                             rel="noopener noreferrer" @click.stop class="link-btn">원문</a>
                          <button class="row-btn" :disabled="formatting"
                            @click="formatSingle(a._idx, a._cat)">
                            <span x-text="(formattingIdx === a._uid && formatting) ? '...' : '요약'"></span>
                          </button>
                        </div>
                      </div>
                    </template>
                    <!-- 빈 열 -->
                    <template x-if="homeDailyColItems(cat).length === 0">
                      <div class="home-daily-empty-col">보도자료 없음</div>
                    </template>
                  </div>
                </template>
              </div>
            </div>

          </div>

          <!-- 하단 3열: 카테고리별 최신 기사 -->
          <div class="home-cat-grid" :style="catGridStyle">
            <template x-for="col in kanbanCols" :key="col.key">
              <div class="home-cat-col" :class="catColClass(col.key)">
                <div class="home-cat-header">
                  <span class="home-cat-title" :class="'kc-' + col.key" x-text="col.label"></span>
                  <span class="kanban-col-count" x-text="col.articles.length + '건'"></span>
                </div>
                <template x-if="col.articles.length === 0">
                  <div class="empty-col">수집된 기사가 없습니다</div>
                </template>
                <template x-for="a in col.articles.slice(0, 5)" :key="a._uid">
                  <div class="home-mini-card">
                    <div class="home-mini-top">
                      <span class="agency-badge"
                            :class="sourceType(a)==='언론기사' ? 'badge-news' : badgeClass(col.key)"
                            x-text="a['기관']"></span>
                      <span class="pri-badge"
                            :class="a['우선순위']==='상' ? 'pri-high' : a['우선순위']==='하' ? 'pri-low' : 'pri-mid'"
                            x-text="a['우선순위'] || '중'"></span>
                    </div>
                    <div class="home-mini-title" x-html="highlight(a['제목'])"></div>
                    <div class="home-mini-foot">
                      <span class="art-card-date" x-text="a['날짜']"></span>
                      <div class="art-card-btns">
                        <a x-show="a['링크']" :href="a['링크']" target="_blank" rel="noopener noreferrer"
                           @click.stop class="link-btn">원문</a>
                        <button class="row-btn" :disabled="formatting"
                          @click="formatSingle(a._idx, col.key)">
                          <span x-text="(formattingIdx === a._uid && formatting) ? '...' : '요약'"></span>
                        </button>
                      </div>
                    </div>
                  </div>
                </template>
                <template x-if="col.articles.length > 5">
                  <button class="home-more-btn" @click="openArticlesPage(col.key)">
                    + <span x-text="col.articles.length - 5"></span>건 더 보기
                  </button>
                </template>
              </div>
            </template>
          </div>

        </div><!-- /HOME -->
      </template>

      <!-- ══ ARTICLES (카테고리 전체 목록) ══ -->
      <template x-if="currentPage === 'articles'">
        <div class="articles-page">

          <!-- 헤더 -->
          <div class="articles-page-header">
            <button class="articles-back-btn" @click="currentPage = 'home'">← HOME</button>
            <span class="articles-page-title"
                  :style="articlesCategory==='페이먼트' ? 'color:var(--pay-color)'
                        : articlesCategory==='AML'      ? 'color:var(--aml-color)'
                        : 'color:var(--accent)'"
                  x-text="articlesCategory + ' 보도자료 · 언론기사'"></span>
          </div>

          <!-- 타입 탭 -->
          <div class="articles-type-tabs">
            <button class="articles-type-tab" :class="articlesTypeFilter==='전체' ? 'active' : ''"
                    @click="articlesTypeFilter='전체'">
              전체 <span x-text="articlesPageItems('전체').length + '건'"></span>
            </button>
            <button class="articles-type-tab" :class="articlesTypeFilter==='보도자료' ? 'active' : ''"
                    @click="articlesTypeFilter='보도자료'">
              보도자료 <span x-text="articlesPageItems('보도자료').length + '건'"></span>
            </button>
            <button class="articles-type-tab tab-news" :class="articlesTypeFilter==='언론기사' ? 'active tab-news' : ''"
                    @click="articlesTypeFilter='언론기사'">
              언론기사 <span x-text="articlesPageItems('언론기사').length + '건'"></span>
            </button>
          </div>

          <!-- 필터 바 -->
          <div class="articles-filter-bar">
            <button class="pri-btn" :class="articlesPriFilter==='' ? 'active-mid' : ''"
                    @click="articlesPriFilter=''">전체</button>
            <button class="pri-btn" :class="articlesPriFilter==='상' ? 'active-high' : ''"
                    @click="articlesPriFilter='상'">상</button>
            <button class="pri-btn" :class="articlesPriFilter==='중' ? 'active-mid' : ''"
                    @click="articlesPriFilter='중'">중</button>
            <button class="pri-btn" :class="articlesPriFilter==='하' ? 'active-low' : ''"
                    @click="articlesPriFilter='하'">하</button>
            <div class="articles-search">
              <span style="font-size:12px;color:var(--t3)">🔍</span>
              <input type="text" x-model="articlesSearchQ" placeholder="기사 검색..." />
              <template x-if="articlesSearchQ">
                <span @click="articlesSearchQ=''" style="cursor:pointer;color:var(--t3);font-size:11px">✕</span>
              </template>
            </div>
            <span class="articles-count" x-text="articlesFiltered.length + '건'"></span>
          </div>

          <!-- 기사 목록 -->
          <template x-if="articlesFiltered.length === 0">
            <div class="empty-list">수집된 기사가 없습니다</div>
          </template>
          <div class="article-list">
            <template x-for="a in articlesFiltered" :key="a._uid">
              <div class="article-row">
                <div class="row-top">
                  <span class="cal-type-badge"
                        :class="sourceType(a)==='언론기사' ? 'cal-type-언론기사' : 'cal-type-보도자료'"
                        x-text="sourceType(a)"></span>
                  <span class="agency-badge"
                        :class="articlesCategory==='데이터' ? 'badge-data'
                              : articlesCategory==='페이먼트' ? 'badge-pay' : 'badge-aml'"
                        x-text="a['기관']"></span>
                  <span class="pri-badge"
                        :class="a['우선순위']==='상' ? 'pri-high' : a['우선순위']==='하' ? 'pri-low' : 'pri-mid'"
                        x-text="a['우선순위'] || '중'"></span>
                  <span class="row-date" x-text="a['날짜']"></span>
                </div>
                <div class="row-title" x-html="highlightQ(a['제목'], articlesSearchQ)"></div>
                <div class="row-lead" x-html="highlightQ(a['내용'], articlesSearchQ)"></div>
                <div class="row-bottom">
                  <a x-show="a['링크']" :href="a['링크']" target="_blank"
                     rel="noopener noreferrer" class="link-btn">원문</a>
                  <button class="row-btn" :disabled="formatting"
                          @click="formatSingle(a._idx, articlesCategory)">
                    <span x-text="(formattingIdx===a._uid && formatting) ? '...' : '요약'"></span>
                  </button>
                </div>
              </div>
            </template>
          </div>

        </div>
      </template>

      <!-- ══ HISTORY ══ -->
      <template x-if="currentPage === 'history'">
        <div class="history-wrap">

          <!-- 통계 카드 -->
          <div class="hist-stats">
            <template x-for="cat in ['전체','데이터','페이먼트','AML']" :key="cat">
              <div class="hist-stat-card"
                   :class="historyCat === cat ? 'active' : ''"
                   @click="historyCat = cat; historySearch = ''">
                <div class="hist-stat-num" x-text="historyStatCount(cat)"></div>
                <div class="hist-stat-label" x-text="cat === '전체' ? '전체' : cat + ' 카테고리'"></div>
              </div>
            </template>
          </div>

          <!-- 검색창 -->
          <div class="hist-search-wrap">
            <div class="hist-search">
              <span style="color:var(--t3);font-size:14px">🔍</span>
              <input type="text" x-model="historySearch"
                     placeholder="제목·요약 내용으로 검색..."/>
              <template x-if="historySearch">
                <span @click="historySearch=''" style="cursor:pointer;color:var(--t3);font-size:12px">✕</span>
              </template>
            </div>
          </div>

          <!-- 건수 -->
          <div class="hist-result-count">
            <span x-text="filteredHistory.length + '건'"></span>
          </div>

          <!-- 테이블 -->
          <table class="history-table">
            <thead>
              <tr>
                <th>PPT 작성일자</th>
                <th>보도자료 일자</th>
                <th>카테고리</th>
                <th>제목</th>
                <th>요약 내용</th>
                <th>주간보고 작성본</th>
              </tr>
            </thead>
            <tbody>
              <template x-if="filteredHistory.length === 0">
                <tr><td colspan="6" class="history-empty">PPT 생성 이력이 없습니다</td></tr>
              </template>
              <template x-for="h in filteredHistory" :key="h.id">
                <tr>
                  <td x-text="h.ppt_created_at" style="white-space:nowrap"></td>
                  <td x-text="h.article_date" style="white-space:nowrap"></td>
                  <td style="white-space:nowrap">
                    <span x-text="h.category || '-'"
                          :style="h.category==='데이터' ? 'color:var(--accent);font-weight:600'
                                : h.category==='페이먼트' ? 'color:var(--pay-color);font-weight:600'
                                : h.category==='AML' ? 'color:var(--aml-color);font-weight:600' : ''">
                    </span>
                  </td>
                  <td x-text="h.title" style="min-width:160px"></td>
                  <td class="history-summary" x-text="h.summary"></td>
                  <td style="white-space:nowrap;text-align:left">
                    <a :href="'/api/ppt/' + h.id" download class="ppt-dl-btn">📥 PPT 열기</a>
                  </td>
                </tr>
              </template>
            </tbody>
          </table>
        </div>
      </template>

      <!-- ══ 법규/정책 ══ -->
      <template x-if="currentPage === 'policy'">
        <div class="policy-wrap">

          <!-- 서브탭 -->
          <div class="policy-subtabs">
            <button class="policy-subtab" :class="policyTab==='dashboard' ? 'active' : ''" @click="policyTab='dashboard'">📊 대시보드</button>
            <button class="policy-subtab" :class="policyTab==='db' ? 'active' : ''" @click="policyTab='db'">📋 정책 DB</button>
            <button class="policy-subtab" :class="policyTab==='calendar' ? 'active' : ''" @click="policyTab='calendar'">📅 대응 캘린더</button>
          </div>

          <!-- ── 대시보드 ── -->
          <template x-if="policyTab==='dashboard'">
            <div>
              <!-- 요약 카드 -->
              <div class="policy-stat-grid">
                <div class="policy-stat-card">
                  <div class="policy-stat-label">전체 정책</div>
                  <div class="policy-stat-num" x-text="policyItems.length"></div>
                </div>
                <div class="policy-stat-card impact-high">
                  <div class="policy-stat-label">영향도 높음</div>
                  <div class="policy-stat-num" x-text="policyItems.filter(p=>p['영향도']==='높음').length"></div>
                </div>
                <div class="policy-stat-card status-active">
                  <div class="policy-stat-label">시행 중</div>
                  <div class="policy-stat-num" x-text="policyItems.filter(p=>p['상태']==='시행중').length"></div>
                </div>
                <div class="policy-stat-card status-pending">
                  <div class="policy-stat-label">입법예정·계류</div>
                  <div class="policy-stat-num" x-text="policyItems.filter(p=>['계류중','입법예정'].includes(p['상태'])).length"></div>
                </div>
                <div class="policy-stat-card status-tracking">
                  <div class="policy-stat-label">트래킹 중</div>
                  <div class="policy-stat-num" x-text="policyItems.filter(p=>p['트래킹여부']==='Y').length"></div>
                </div>
              </div>

              <!-- 연간 간트 차트 -->
              <div class="policy-section-title" style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
                📅 연간 정책 시행 현황
                <div class="gantt-year-nav">
                  <button class="gantt-year-btn" @click="policyGanttYear--">‹</button>
                  <span class="gantt-year-label" x-text="policyGanttYear + '년'"></span>
                  <button class="gantt-year-btn" @click="policyGanttYear++">›</button>
                </div>
              </div>

              <!-- 범례 -->
              <div class="gantt-legend">
                <span class="gantt-legend-item" style="background:#94a3b8">이미 지남</span>
                <span class="gantt-legend-item" style="background:#16a34a">시행 중</span>
                <span class="gantt-legend-item" style="background:#dc2626">D-30 이내</span>
                <span class="gantt-legend-item" style="background:#d97706">D-90 이내</span>
                <span class="gantt-legend-item" style="background:#2563eb">시행 예정</span>
                <span class="gantt-legend-item" style="background:#7c3aed">계류/입법예정</span>
              </div>

              <div class="gantt-card" style="margin-bottom:24px">
                <!-- 월 헤더 -->
                <div class="gantt-header">
                  <div class="gantt-row-label"><span class="gantt-label-text" style="color:var(--t3)">구분</span></div>
                  <template x-for="m in 12" :key="m">
                    <div class="gantt-month-cell"
