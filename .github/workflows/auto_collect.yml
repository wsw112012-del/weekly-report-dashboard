name: 보도자료 자동 수집 (평일 09:00 수집 / 14:00 게시)

on:
  schedule:
    # ── 평일 09:00 KST — 수집만 (Render 대시보드 데이터 갱신용)
    #     Flow 게시 step 은 아래 if 조건으로 skip 됨.
    - cron: '0 0 * * 1-5'   # 09:00 KST 평일 수집만
    # ── 평일 14:00 KST — 수집 + Flow 게시
    #     공공기관 보도자료(11시 전후)·종일 언론기사 신규분 모두 포함.
    - cron: '0 5 * * 1-5'   # 14:00 KST 평일 수집+게시
    # ── 주말 14:00 KST — 수집 + Flow 게시
    #     주말 매체 송고 완료 시점.
    - cron: '0 5 * * 0,6'   # 14:00 KST 주말 수집+게시
  workflow_dispatch:         # 수동 실행 버튼 (게시 포함)

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    # 한글 파일명·인수·출력 안정화 (Ubuntu 기본은 C.UTF-8이지만 명시)
    env:
      PYTHONIOENCODING: utf-8
      PYTHONUTF8: '1'
      LANG: ko_KR.UTF-8
      TZ: Asia/Seoul   # date.today() 계열을 KST 기준으로 통일 (2회 게시 방지 이중 안전장치)

    steps:
      - uses: actions/checkout@v4

      - name: Python 3.12 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 패키지 설치
        run: pip install requests beautifulsoup4 lxml python-dotenv Pillow

      - name: 데이터(AI) 수집
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python collect_보도자료.py 데이터

      - name: 페이먼트(전자금융) 수집
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python collect_보도자료.py 페이먼트

      - name: AML(자금세탁방지) 수집
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python collect_보도자료.py AML

      - name: 입법현황 수집 (정부·국회)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python collect_입법현황.py 입법현황

      - name: 국회의원 보도자료 수집 (nanet.go.kr)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python collect_입법현황.py 보도자료

      # 법제처 OpenAPI 는 호출 서버 IP 사전등록 필요. GitHub Actions ubuntu-latest 의
      # 가변 IP 풀은 등록 불가 → 매번 connection timeout 발생. 실패가 잡혀도 후속
      # step에 영향 없도록 continue-on-error 처리. 실데이터는 등록된 IP (사용자 PC
      # 또는 Render outbound) 에서 별도 수집.
      - name: 유권해석/판례 수집 (대상 법령)
        if: ${{ !cancelled() }}
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          LAWGO_OC:     ${{ secrets.LAWGO_OC }}
        run: python collect_precedent.py --max 30

      - name: 법령 본문 수집 (변경 감지)
        if: ${{ !cancelled() }}
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          LAWGO_OC:     ${{ secrets.LAWGO_OC }}
        run: python collect_law_articles.py

      - name: 수집 데이터 품질 검증
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python validate_data.py

      # [DISABLED 2026-05-12] AML 일일 리스크 다이제스트 (notify_flow.py, v3 PNG 카드).
      # 신규 v1 Bot API 라인(daily_monitor_post.py)이 동등 정보를 텍스트 카드로 발송하므로
      # 중복 운영 방지 차원에서 비활성화. 파일(notify_flow.py, flow_card.py)은 보존.
      # 향후 재활성화 시: 아래 블록 주석 해제 + 실패 원인(폰트/계정 등) 진단 필요.

      - name: Flow 데일리 모니터링 게시글 (v1 Bot API)
        # 14:00 KST cron (평일·주말) + 수동(workflow_dispatch) 에서만 게시.
        # 09:00 KST 평일 수집 cron 은 데이터 갱신만 하고 skip.
        # 중복 발송 방지는 daily_monitor_post.py 의 flow_post_log 체크가 담당.
        if: ${{ !cancelled() && (github.event.schedule == '0 5 * * 1-5' || github.event.schedule == '0 5 * * 0,6' || github.event_name == 'workflow_dispatch') }}
        env:
          SUPABASE_URL:    ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:    ${{ secrets.SUPABASE_KEY }}
          FLOW_API_KEY:    ${{ secrets.FLOW_API_KEY }}
          FLOW_BOT_ID:     ${{ secrets.FLOW_BOT_ID }}
          FLOW_PROJECT_ID: ${{ secrets.FLOW_PROJECT_ID }}
          GEMINI_API_KEY:  ${{ secrets.GEMINI_API_KEY }}  # 임베딩 유사도 그룹화
        run: python daily_monitor_post.py
