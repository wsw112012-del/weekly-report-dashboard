name: 보도자료 자동 수집 (09:00 KST)

on:
  schedule:
    - cron: '0 0 * * *'   # 00:00 UTC = 09:00 KST
  workflow_dispatch:         # 수동 실행 버튼

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    # 한글 파일명·인수·출력 안정화 (Ubuntu 기본은 C.UTF-8이지만 명시)
    env:
      PYTHONIOENCODING: utf-8
      PYTHONUTF8: '1'
      LANG: ko_KR.UTF-8

    steps:
      - uses: actions/checkout@v4

      - name: Python 3.12 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 패키지 설치
        run: pip install requests beautifulsoup4 lxml python-dotenv Pillow

      - name: 데이터(AI) 수집
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python collect_보도자료.py 데이터

      - name: 페이먼트(전자금융) 수집
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python collect_보도자료.py 페이먼트

      - name: AML(자금세탁방지) 수집
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python collect_보도자료.py AML

      - name: 입법현황 수집 (정부·국회)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python collect_입법현황.py 입법현황

      - name: 국회의원 보도자료 수집 (nanet.go.kr)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python collect_입법현황.py 보도자료

      - name: 유권해석/판례 수집 (대상 법령)
        if: ${{ !cancelled() }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          LAWGO_OC:     ${{ secrets.LAWGO_OC }}
        run: python collect_precedent.py --max 30

      # 법령 본문 (3단비교용) — 매일 lawSearch.do MST 확인 후 변경된 것만 재수집.
      # 처음 한 번 또는 본문 갱신 시점에만 실제 fetch가 일어나 호출량 적음.
      - name: 법령 본문 수집 (변경 감지)
        if: ${{ !cancelled() }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          LAWGO_OC:     ${{ secrets.LAWGO_OC }}
        run: python collect_law_articles.py

      - name: 수집 데이터 품질 검증
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python validate_data.py

      # [DISABLED 2026-05-12] AML 일일 리스크 다이제스트 (notify_flow.py, v3 PNG 카드).
      # 신규 v1 Bot API 라인(daily_monitor_post.py)이 동등 정보를 텍스트 카드로 발송하므로
      # 중복 운영 방지 차원에서 비활성화. 파일(notify_flow.py, flow_card.py)은 보존.
      # 향후 재활성화 시: 아래 블록 주석 해제 + 실패 원인(폰트/계정 등) 진단 필요.

      - name: Flow 데일리 모니터링 게시글 (v1 Bot API)
        # 이전 'AML 일일 리스크 다이제스트(notify_flow.py, v3)' 와 독립 라인 — 그 step
        # 실패해도 실행되도록 always()/cancelled 조건. job 자체가 cancel 되면 skip.
        if: ${{ !cancelled() }}
        env:
          SUPABASE_URL:    ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:    ${{ secrets.SUPABASE_KEY }}
          FLOW_API_KEY:    ${{ secrets.FLOW_API_KEY }}
          FLOW_BOT_ID:     ${{ secrets.FLOW_BOT_ID }}
          FLOW_PROJECT_ID: ${{ secrets.FLOW_PROJECT_ID }}
        run: python daily_monitor_post.py
